<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>דמי כיס - הקופה שלי</title>
  <meta name="theme-color" content="#4F46E5" />
  
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      document.getElementById('root').innerHTML = '<div style="color:white; background:red; padding:20px; direction:ltr; text-align:left; font-family:monospace; margin:20px; border-radius:10px;"><b>Error:</b> ' + message + '<br/><b>Line:</b> ' + lineno + '</div>';
      return true;
    };
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" />
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.0/babel.min.js" crossorigin="anonymous"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.8.1/firebase-app-compat.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.8.1/firebase-firestore-compat.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.8.1/firebase-auth-compat.min.js" crossorigin="anonymous"></script>

  <style>
    body { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  
  <div id="root">
    <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; gap:16px;">
      <div style="width:50px; height:50px; border:5px solid #4F46E5; border-bottom-color:transparent; border-radius:50%; animation: spin 1s linear infinite;"></div>
      <div style="font-family:sans-serif; font-weight:bold; color:#4F46E5; font-size:20px; text-align:center;">
        מתחבר לענן...
      </div>
      <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = window.React;
    const { createRoot } = window.ReactDOM;

    const firebaseConfig = {
      apiKey: "AIzaSyCFfeIHcPMrsMgi_Jtwys-L352h8RSSqig",
      authDomain: "pocket-money-e1b90.firebaseapp.com",
      projectId: "pocket-money-e1b90",
      storageBucket: "pocket-money-e1b90.firebasestorage.app",
      messagingSenderId: "793039825028",
      appId: "1:793039825028:web:eda4bc6f1f0cf603e57ad1",
      measurementId: "G-NHL5SBQV56"
    };

    if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
    const auth = window.firebase.auth();
    auth.languageCode = 'he'; 
    const db = window.firebase.firestore();
    const appId = 'pocket-money-2025';

    const Icon = ({ name, size = 24, className = "" }) => (
      <i className={`${name} ${className}`} style={{ fontSize: `${size}px`, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: `${size}px`, height: `${size}px` }}></i>
    );

    const Wallet = (p) => <Icon name="fas fa-wallet" {...p} />;
    const Target = (p) => <Icon name="fas fa-bullseye" {...p} />;
    const ListChecks = (p) => <Icon name="fas fa-tasks" {...p} />;
    const Accessibility = (p) => <Icon name="fas fa-universal-access" {...p} />;
    const Plus = (p) => <Icon name="fas fa-plus" {...p} />;
    const ShieldCheck = (p) => <Icon name="fas fa-shield-alt" {...p} />;
    const Sun = (p) => <Icon name="fas fa-sun" {...p} />;
    const Moon = (p) => <Icon name="fas fa-moon" {...p} />;
    const Info = (p) => <Icon name="fas fa-info-circle" {...p} />;
    const CheckCircle2 = (p) => <Icon name="fas fa-check-circle" {...p} />;
    const Circle = (p) => <Icon name="far fa-circle" {...p} />;
    const Trash2 = (p) => <Icon name="fas fa-trash-alt" {...p} />;
    const UserCircle = (p) => <Icon name="fas fa-user-circle" {...p} />;
    const Settings = (p) => <Icon name="fas fa-cog" {...p} />;
    const AlertCircle = (p) => <Icon name="fas fa-exclamation-circle" {...p} />;
    const Trophy = (p) => <Icon name="fas fa-trophy" {...p} />;
    const X = (p) => <Icon name="fas fa-times" {...p} />;
    const Users = (p) => <Icon name="fas fa-users" {...p} />;
    const UserPlus = (p) => <Icon name="fas fa-user-plus" {...p} />;
    const Lock = (p) => <Icon name="fas fa-lock" {...p} />;
    const Repeat = (p) => <Icon name="fas fa-redo" {...p} />;
    const Share2 = (p) => <Icon name="fas fa-share-alt" {...p} />;
    const Copy = (p) => <Icon name="fas fa-copy" {...p} />;
    const Bell = (p) => <Icon name="fas fa-bell" {...p} />;

    const Toast = ({ message, type, onClose }) => {
      if (!message) return null;
      const bgColor = type === 'error' ? 'bg-red-500' : 'bg-green-500';
      return (
        <div className={`fixed bottom-24 md:bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white font-bold shadow-xl z-50 flex items-center gap-3 animate-bounce ${bgColor}`} dir="rtl">
          {type === 'error' ? <AlertCircle size={20} /> : <CheckCircle2 size={20} />}
          <span>{message}</span>
          <button onClick={onClose} className="p-1 hover:bg-white/20 rounded-full mr-2"><X size={16} /></button>
        </div>
      );
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [familyId, setFamilyId] = useState('');
      const [profiles, setProfiles] = useState([]);
      const [allTasks, setAllTasks] = useState([]);
      const [allGoals, setAllGoals] = useState([]);
      const [allNotifications, setAllNotifications] = useState([]);
      const [activeProfileId, setActiveProfileId] = useState(null);
      const [securitySettings, setSecuritySettings] = useState({});
      
      const [isReady, setIsReady] = useState(false);
      const [toast, setToast] = useState({ message: '', type: '' });

      const [modalConfig, setModalConfig] = useState(null);
      const [modalInput1, setModalInput1] = useState('');
      const [modalInput2, setModalInput2] = useState('');
      const [modalInput3, setModalInput3] = useState(false);

      const [isDarkMode, setIsDarkMode] = useState(false);
      const [highContrast, setHighContrast] = useState(false);
      const [fontSize, setFontSize] = useState(16);
      const [isAccessMenuOpen, setIsAccessMenuOpen] = useState(false);
      const [viewMode, setViewMode] = useState('child'); 

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast({ message: '', type: '' }), 4000);
      };

      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        let fid = urlParams.get('familyId');
        if (!fid) {
          fid = Math.random().toString(36).substring(2, 8).toUpperCase();
          try { window.history.replaceState(null, '', '?familyId=' + fid); } catch (e) {}
        }
        setFamilyId(fid);
      }, []);

      useEffect(() => {
        const initAuth = async () => {
          try { await auth.signInAnonymously(); } 
          catch (error) { showToast("שגיאת התחברות לחשבון", "error"); setIsReady(true); }
        };
        initAuth();
        
        const unsubscribeAuth = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          if (!currentUser) setIsReady(true);
        });
        return () => unsubscribeAuth();
      }, []);

      useEffect(() => {
        if (!user || !familyId) return;

        const securityRef = db.doc(`artifacts/${appId}/public/data/security/${familyId}`);
        const unsubscribeSecurity = securityRef.onSnapshot((docSnap) => {
          if (docSnap.exists) setSecuritySettings(docSnap.data());
          else setSecuritySettings({});
        });

        const profilesCol = db.collection(`artifacts/${appId}/public/data/profiles`);
        const unsubscribeProfiles = profilesCol.onSnapshot((snapshot) => {
          const items = snapshot.docs.map(d => Object.assign({ id: d.id }, d.data()));
          setProfiles(items.filter(i => i.familyId === familyId));
          setIsReady(true);
        }, (err) => { setIsReady(true); });

        const tasksCol = db.collection(`artifacts/${appId}/public/data/tasks`);
        const unsubscribeTasks = tasksCol.onSnapshot((snapshot) => {
          const items = snapshot.docs.map(d => Object.assign({ id: d.id }, d.data()));
          setAllTasks(items.filter(i => i.familyId === familyId));
        });

        const goalsCol = db.collection(`artifacts/${appId}/public/data/goals`);
        const unsubscribeGoals = goalsCol.onSnapshot((snapshot) => {
          const items = snapshot.docs.map(d => Object.assign({ id: d.id }, d.data()));
          setAllGoals(items.filter(i => i.familyId === familyId));
        });

        const notifCol = db.collection(`artifacts/${appId}/public/data/notifications`);
        const unsubscribeNotif = notifCol.onSnapshot((snapshot) => {
          const items = snapshot.docs.map(d => Object.assign({ id: d.id }, d.data()));
          setAllNotifications(items.filter(i => i.familyId === familyId));
        });

        return () => {
          unsubscribeSecurity(); unsubscribeProfiles(); unsubscribeTasks(); unsubscribeGoals(); unsubscribeNotif();
        };
      }, [user, familyId]);

      const activeProfile = profiles.find(p => p.id === activeProfileId);
      const tasks = allTasks.filter(t => t.childId === activeProfileId);
      const goals = allGoals.filter(g => g.childId === activeProfileId);

      const sortedProfiles = useMemo(() => [...profiles].sort((a, b) => a.createdAt - b.createdAt), [profiles]);
      const sortedTasks = useMemo(() => [...tasks].sort((a, b) => b.createdAt - a.createdAt), [tasks]);
      const sortedGoals = useMemo(() => [...goals].sort((a, b) => b.createdAt - a.createdAt), [goals]);

      const myNotifications = useMemo(() => 
        allNotifications.filter(n => viewMode === 'parent' ? n.target === 'parent' : n.target === activeProfileId)
        .sort((a, b) => b.createdAt - a.createdAt), [allNotifications, viewMode, activeProfileId]
      );
      const unreadCount = useMemo(() => myNotifications.filter(n => !n.isRead).length, [myNotifications]);

      const notify = async (text, target) => {
        if (!user || !familyId) return;
        await db.collection(`artifacts/${appId}/public/data/notifications`).add({
          familyId: familyId, text: text, target: target, isRead: false, createdAt: Date.now()
        });
      };

      const markNotificationsAsRead = () => {
        const unread = myNotifications.filter(n => !n.isRead);
        Promise.all(unread.map(n => db.doc(`artifacts/${appId}/public/data/notifications/${n.id}`).update({ isRead: true })));
      };

      const copyShareLink = async () => {
        let currentUrl = window.location.href;
        const url = new URL(currentUrl);
        url.searchParams.set('familyId', familyId);
        currentUrl = url.toString();
        
        const shareText = `הצטרפו אליי לאפליקציית דמי כיס! 💸\nקוד המשפחה שלנו הוא: ${familyId}\n\nלכניסה ישירה לחצו כאן:\n${currentUrl}`;
        
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(shareText);
            showToast("הקישור הועתק! שתפו בוואטסאפ 🔗", "success");
          } else {
            const ta = document.createElement("textarea");
            ta.value = shareText;
            ta.style.cssText = "position:fixed;left:-9999px;top:-9999px";
            document.body.appendChild(ta); ta.focus(); ta.select();
            document.execCommand('copy'); document.body.removeChild(ta);
            showToast("הקישור הועתק! שתפו בוואטסאפ 🔗", "success");
          }
        } catch (err) { showToast("שגיאה בהעתקת הקישור", "error"); }
      };

      const handleParentModeRequest = () => {
        if (viewMode === 'parent') return; 
        if (!securitySettings.parentPin) openModal('setPin'); 
        else openModal('enterPin'); 
      };

      const openModal = (type, data = null) => {
        setModalInput1(''); setModalInput2(''); setModalInput3(false); setModalConfig({ type: type, data: data });
      };

      const executeModalAction = async () => {
        if (!user || !familyId) return;
        const type = modalConfig.type;
        const data = modalConfig.data;
        const input1 = modalInput1.trim();
        const input2 = modalInput2;
        const input3 = modalInput3;
        
        try {
          if (type === 'joinFamily') {
            const code = input1.toUpperCase();
            if (!code || code.length < 3) return showToast("אנא הזינו קוד תקין", "error");
            setModalConfig(null); 
            setFamilyId(code);
            try { window.history.replaceState(null, '', '?familyId=' + code); } catch (e) {}
            showToast("מתחבר למשפחה...", "success");
            return;
          }

          if (type === 'setPin') {
            if (input1.length !== 4 || isNaN(Number(input1))) return showToast("הקוד חייב לכלול 4 ספרות בדיוק", "error");
            setModalConfig(null);
            await db.doc(`artifacts/${appId}/public/data/security/${familyId}`).set({ parentPin: input1 });
            setViewMode('parent');
            showToast("קוד ההורה הוגדר בהצלחה!");
            return;
          }

          if (type === 'enterPin') {
            if (input1 === securitySettings.parentPin) {
              setModalConfig(null);
              setViewMode('parent');
              showToast("התחברת בהצלחה לתצוגת הורה!");
            } else return showToast("קוד שגוי, נסו שוב", "error");
            return;
          }

          if (type === 'addChild') {
            if (!input1) return showToast("השם לא יכול להיות ריק", "error");
            setModalConfig(null);
            const newProfileRef = await db.collection(`artifacts/${appId}/public/data/profiles`).add({
              familyId: familyId, name: input1, balance: 0, createdAt: Date.now()
            });
            setActiveProfileId(newProfileRef.id);
            showToast(`הפרופיל של ${input1} נוצר בהצלחה!`);
            return;
          } 
          
          if (type === 'addTask') {
            const reward = Number(input2);
            if (!input1) return showToast("שם המשימה לא יכול להיות ריק", "error");
            if (isNaN(reward) || reward <= 0) return showToast("התגמול חייב להיות מספר חיובי", "error");
            setModalConfig(null);
            await db.collection(`artifacts/${appId}/public/data/tasks`).add({
              familyId: familyId, childId: activeProfileId, title: input1, reward: reward, isRecurring: !!input3, completed: false, approved: false, createdAt: Date.now()
            });
            notify(`משימה חדשה ממתינה לך: "${input1}" (₪${reward})`, activeProfileId);
            showToast("המשימה נשמרה בהצלחה!");
            return;
          }

          if (type === 'addGoal') {
            const target = Number(input2);
            if (!input1) return showToast("שם היעד לא יכול להיות ריק", "error");
            if (isNaN(target) || target <= 0) return showToast("המחיר חייב להיות מספר חיובי", "error");
            setModalConfig(null);
            await db.collection(`artifacts/${appId}/public/data/goals`).add({
              familyId: familyId, childId: activeProfileId, title: input1, target: target, createdAt: Date.now()
            });
            showToast("יעד חיסכון חדש נוסף!");
            return;
          }

          if (type === 'deleteTask') {
            setModalConfig(null);
            await db.doc(`artifacts/${appId}/public/data/tasks/${data.id}`).delete();
            showToast("המשימה נמחקה");
            return;
          }

          if (type === 'deleteGoal') {
            setModalConfig(null);
            await db.doc(`artifacts/${appId}/public/data/goals/${data.id}`).delete();
            showToast("היעד נמחק");
            return;
          }
        } catch (error) {
          console.error(error);
          setModalConfig(null); 
          showToast("שגיאת הרשאות בענן.", "error");
        }
      };

      const toggleTaskCompletion = async (task) => {
        if (!user || viewMode !== 'child') return;
        if (task.approved) return showToast("המשימה כבר אושרה ושולמה, לא ניתן לשנות.", "error");
        try {
          const isNowCompleted = !task.completed;
          await db.doc(`artifacts/${appId}/public/data/tasks/${task.id}`).update({ completed: isNowCompleted });
          const profileName = activeProfile ? activeProfile.name : '';
          if (isNowCompleted) notify(`${profileName} סיימה את המשימה "${task.title}" וממתינה לאישור!`, 'parent');
        } catch (error) { showToast("שגיאה בעדכון", "error"); }
      };

      const toggleTaskApproval = async (task) => {
        if (!user || viewMode !== 'parent' || !activeProfile) return;
        if (!task.completed && !task.approved) return showToast("לא ניתן לאשר משימה שטרם בוצעה.", "error");

        try {
          const taskRef = db.doc(`artifacts/${appId}/public/data/tasks/${task.id}`);
          const profileRef = db.doc(`artifacts/${appId}/public/data/profiles/${task.childId}`);
          
          if (!task.approved) {
            await profileRef.update({ balance: activeProfile.balance + task.reward });
            notify(`איזה יופי! המשימה "${task.title}" אושרה וקיבלת ₪${task.reward}!`, task.childId);
            if (task.isRecurring) {
              await taskRef.update({ completed: false, approved: false });
              showToast(`שולם ₪${task.reward} והמשימה התאפסה!`);
            } else {
              await taskRef.update({ approved: true });
              showToast(`שולם ₪${task.reward} בהצלחה!`);
            }
          } else {
            await profileRef.update({ balance: Math.max(0, activeProfile.balance - task.reward) });
            await taskRef.update({ approved: false });
            showToast("האישור בוטל והכסף ירד.", "error");
          }
        } catch (error) { showToast("שגיאה בעדכון יתרה", "error"); }
      };

      const accessibilityStyles = useMemo(() => ({ fontSize: `${fontSize}px` }), [fontSize]);
      const themeClasses = highContrast ? 'bg-black text-yellow-400' : isDarkMode ? 'bg-slate-900 text-white' : 'bg-gray-50 text-gray-900';
      const cardClasses = highContrast ? 'bg-gray-900 border-2 border-yellow-400' : isDarkMode ? 'bg-slate-800 border-slate-700 border' : 'bg-white border-gray-100 border shadow-sm';
      const modalInputClass = `w-full p-4 rounded-xl border-2 font-medium focus:outline-none transition-colors text-center text-xl tracking-widest ${highContrast ? 'bg-black border-yellow-400 text-yellow-400 placeholder-yellow-600/50 focus:bg-yellow-400/10' : isDarkMode ? 'bg-slate-700 border-slate-600 text-white placeholder-slate-400 focus:border-indigo-500' : 'bg-gray-50 border-gray-200 text-gray-900 focus:border-indigo-500 focus:bg-white'}`;
      const modalTextInputClass = `w-full p-4 rounded-xl border-2 font-medium focus:outline-none transition-colors ${highContrast ? 'bg-black border-yellow-400 text-yellow-400 placeholder-yellow-600/50 focus:bg-yellow-400/10' : isDarkMode ? 'bg-slate-700 border-slate-600 text-white placeholder-slate-400 focus:border-indigo-500' : 'bg-gray-50 border-gray-200 text-gray-900 focus:border-indigo-500 focus:bg-white'}`;
      const modalCancelBtn = `flex-1 py-3 rounded-xl font-bold transition-colors ${highContrast ? 'bg-transparent border-2 border-yellow-400 text-yellow-400 hover:bg-yellow-400/10' : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-slate-600'}`;
      const modalSubmitBtn = `flex-1 py-3 rounded-xl font-bold transition-transform active:scale-95 ${highContrast ? 'bg-yellow-400 text-black' : 'bg-indigo-600 text-white shadow-lg shadow-indigo-200 dark:shadow-none hover:bg-indigo-700'}`;

      if (!isReady) return null;

      return (
        <div className={`min-h-screen transition-colors duration-300 pb-24 ${themeClasses}`} style={accessibilityStyles} dir="rtl">
          <Toast message={toast.message} type={toast.type} onClose={() => setToast({ message: '', type: '' })} />

          <nav className={`sticky top-0 z-40 border-b backdrop-blur-md ${highContrast ? 'bg-black border-yellow-400' : isDarkMode ? 'bg-slate-900/90 border-slate-700' : 'bg-white/90 border-gray-200'}`}>
            <div className="max-w-5xl mx-auto px-4 flex justify-between h-[72px] items-center">
              <div className="flex items-center gap-3">
                <div className={`p-2 rounded-xl shadow-lg ${highContrast ? 'bg-yellow-400 text-black' : 'bg-indigo-600 text-white shadow-indigo-200'}`}>
                  <Wallet size={28} />
                </div>
                <span className={`text-2xl font-black tracking-tight ${highContrast ? 'text-yellow-400' : 'text-indigo-600'}`}>דמי כיס</span>
              </div>

              <div className="flex items-center gap-2">

                {activeProfileId && (
                  <button onClick={() => { openModal('notifications'); markNotificationsAsRead(); }} className="relative min-w-[44px] min-h-[44px] flex items-center justify-center rounded-full hover:bg-gray-200 dark:hover:bg-slate-800 transition-colors">
                    <Bell size={24} className={highContrast ? 'text-yellow-400' : 'text-indigo-600'} />
                    {unreadCount > 0 && <span className="absolute top-2 right-2 w-3 h-3 bg-red-500 rounded-full border-2 border-white dark:border-slate-900"></span>}
                  </button>
                )}

                <button onClick={copyShareLink} className={`min-w-[44px] min-h-[44px] flex items-center justify-center rounded-full transition-colors ${highContrast ? 'text-yellow-400 border border-yellow-400 hover:bg-yellow-400 hover:text-black' : 'bg-green-100 text-green-700 hover:bg-green-200 dark:bg-green-900/30 dark:text-green-400'}`}>
                  <Share2 size={20} />
                </button>

                {activeProfileId && (
                  <div className={`hidden sm:flex p-1 rounded-xl ml-2 ${highContrast ? 'border border-yellow-400' : 'bg-gray-100 dark:bg-slate-800'}`}>
                    <button onClick={() => setViewMode('child')} className={`min-h-[44px] px-4 rounded-lg font-bold transition-all ${viewMode === 'child' ? (highContrast ? 'bg-yellow-400 text-black' : 'bg-white dark:bg-slate-700 shadow-sm text-indigo-600') : 'text-gray-500'}`}>תצוגת ילדה</button>
                    <button onClick={handleParentModeRequest} className={`min-h-[44px] px-4 rounded-lg font-bold transition-all flex items-center gap-1 ${viewMode === 'parent' ? (highContrast ? 'bg-yellow-400 text-black' : 'bg-white dark:bg-slate-700 shadow-sm text-indigo-600') : 'text-gray-500'}`}>
                      תצוגת הורה {viewMode === 'child' && <Lock size={12} />}
                    </button>
                  </div>
                )}
                
                <button onClick={() => setIsAccessMenuOpen(true)} className="min-w-[44px] min-h-[44px] flex items-center justify-center rounded-full hover:bg-gray-200 dark:hover:bg-slate-800 transition-colors">

          {!activeProfileId ? (
            <div className="flex items-center justify-center p-4 mt-12 relative">
              <div className={`max-w-md w-full rounded-[2.5rem] p-8 shadow-2xl text-center relative z-10 ${highContrast ? 'border-2 border-yellow-400 bg-black' : isDarkMode ? 'bg-slate-800 border border-slate-700' : 'bg-white'}`}>
                <div className={`w-20 h-20 mx-auto rounded-3xl flex items-center justify-center mb-6 shadow-lg ${highContrast ? 'bg-yellow-400 text-black' : 'bg-indigo-600 text-white shadow-indigo-200'}`}>
                  <Wallet size={40} />
                </div>
                
                {profiles.length === 0 ? (
                  <>
                    <h2 className="text-3xl font-black mb-2">ברוכים הבאים! 👋</h2>
                    <p className={`mb-4 font-medium ${highContrast ? 'text-yellow-400' : 'text-gray-500 dark:text-slate-400'}`}>
                      התחברתם למשפחה <b>{familyId}</b>.<br/>

                    </p>
                    
                    <div className={`mb-6 p-3 rounded-xl flex items-center justify-between border-2 border-dashed ${highContrast ? 'border-yellow-400 text-yellow-400' : 'border-indigo-200 bg-indigo-50/50 text-indigo-800 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300'}`}>

                        <span className="text-[10px] font-bold uppercase opacity-70">קוד המשפחה</span>
                        <span className="text-xl font-black tracking-widest">{familyId}</span>
                      </div>
                      <button onClick={copyShareLink} className="p-2 bg-white dark:bg-slate-700 rounded-lg shadow-sm hover:scale-105 transition-transform"><Copy size={18} className="text-indigo-600 dark:text-indigo-400" /></button>
                    </div>

                    <div className="flex flex-col gap-3 mb-6">
                      <button onClick={() => openModal('addChild')} className={`w-full min-h-[54px] font-bold flex items-center justify-center gap-2 rounded-2xl transition-all ${highContrast ? 'bg-yellow-400 text-black' : 'bg-indigo-600 text-white shadow-lg shadow-indigo-200 hover:bg-indigo-700'}`}>
                        <UserPlus size={20} /> יצירת פרופיל
                      </button>
                      <button onClick={() => openModal('joinFamily')} className={`w-full min-h-[54px] font-bold flex items-center justify-center gap-2 border-2 transition-all rounded-2xl ${highContrast ? 'border-yellow-400 text-yellow-400 hover:bg-yellow-400 hover:text-black' : 'border-indigo-200 text-indigo-700 bg-indigo-50 hover:bg-indigo-100 dark:border-slate-600 dark:bg-slate-700 dark:text-white'}`}>
                        <Users size={20} /> מעבר לקוד משפחה אחר
                      </button>
                    </div>
                  </>
                ) : (
                  <>
                    <h2 className="text-3xl font-black mb-2">מי מתחבר/ת עכשיו?</h2>
                    <p className={`mb-4 font-medium ${highContrast ? 'text-yellow-400' : 'text-gray-500 dark:text-slate-400'}`}>בחרו פרופיל כדי להמשיך או הוסיפו פרופיל חדש.</p>
                    <div className={`mb-6 p-3 rounded-xl flex items-center justify-between border-2 border-dashed ${highContrast ? 'border-yellow-400 text-yellow-400' : 'border-indigo-200 bg-indigo-50/50 text-indigo-800 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-300'}`}>
                      <div className="flex flex-col text-right">
                        <span className="text-[10px] font-bold uppercase opacity-70">קוד המשפחה</span>
                        <span className="text-xl font-black tracking-widest">{familyId}</span>
                      </div>
                      <button onClick={copyShareLink} className="p-2 bg-white dark:bg-slate-700 rounded-lg shadow-sm hover:scale-105 transition-transform"><Copy size={18} className="text-indigo-600 dark:text-indigo-400" /></button>
                    </div>
                    <div className="grid grid-cols-2 gap-4 mb-6">
                      {sortedProfiles.map(p => (
                        <button key={p.id} onClick={() => { setActiveProfileId(p.id); }} className={`flex flex-col items-center p-4 border-2 rounded-2xl transition-transform hover:scale-105 active:scale-95 ${highContrast ? 'border-yellow-400 hover:bg-yellow-400 hover:text-black' : 'border-gray-100 dark:border-slate-700 hover:border-indigo-600 hover:bg-indigo-50 dark:hover:bg-slate-700'}`}>
                          <div className={`w-14 h-14 rounded-full mb-3 flex items-center justify-center ${highContrast ? 'bg-gray-800' : 'bg-indigo-100 text-indigo-600 dark:bg-slate-600 dark:text-white'}`}>
                            <UserCircle size={32} />
                          </div>
                          <span className="font-bold text-lg">{p.name}</span>
                        </button>
                      ))}
                    </div>
                    {viewMode === 'parent' && (
                      <button onClick={() => openModal('addChild')} className={`w-full min-h-[54px] font-bold flex items-center justify-center gap-2 border-2 border-dashed rounded-2xl transition-all ${highContrast ? 'border-yellow-400 text-yellow-400 hover:bg-yellow-400 hover:text-black' : 'border-indigo-300 text-indigo-600 hover:bg-indigo-50 dark:border-slate-600 dark:text-slate-300 dark:hover:bg-slate-700'}`}>
                        <UserPlus size={20} /> הוספת פרופיל

                              {p.name}
                            </button>
                          ))}
                          {viewMode === 'parent' && (
                            <button onClick={() => openModal('addChild')} className={`text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 transition-colors hover:scale-105 ${highContrast ? 'bg-yellow-400 text-black' : 'bg-indigo-600 text-white shadow-sm hover:bg-indigo-700'}`}>

                              {p.name}
                            </button>
                          ))}

                            <button onClick={() => openModal('addChild')} className={`text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 ${highContrast ? 'bg-yellow-400 text-black' : 'bg-indigo-600 text-white'}`}>

                            </button>

                  </div>
                </div>

                    {viewMode === 'parent' && (
                      <button onClick={() => openModal('addTask')} className={`min-h-[44px] px-4 rounded-xl font-bold flex items-center gap-2 transition-transform hover:scale-105 active:scale-95 ${highContrast ? 'bg-yellow-400 text-black' : 'bg-orange-100 text-orange-700'}`}>

                      </button>
                    )}
                  </div>

                      <div className={`text-center py-12 rounded-3xl border-2 border-dashed ${highContrast ? 'border-yellow-400/50' : 'border-gray-200 dark:border-slate-700'}`}>
                        <p className="font-medium opacity-60">אין משימות כרגע עבור {activeProfile ? activeProfile.name : ''}...</p>
                      </div>

                      sortedTasks.map(task => (
                        <div key={task.id} className={`flex flex-col sm:flex-row sm:items-center justify-between p-5 rounded-[2rem] transition-all gap-4 ${task.approved ? (highContrast ? 'border-2 border-yellow-400 opacity-80' : 'bg-green-50 dark:bg-green-900/20 border-2 border-green-200 dark:border-green-800') : cardClasses}`}>

                            <button onClick={() => viewMode === 'child' ? toggleTaskCompletion(task) : null} disabled={viewMode === 'parent' || task.approved} className={`min-w-[44px] min-h-[44px] flex items-center justify-center rounded-xl transition-all ${task.approved ? 'text-green-500 cursor-not-allowed' : task.completed ? (highContrast ? 'text-yellow-400' : 'text-green-500') : 'text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700'}`}>
                              {task.approved || task.completed ? <CheckCircle2 size={32} /> : <Circle size={32} />}
                            </button>
                            <div>
                              <div className="flex items-center gap-2">
                                <p className={`text-lg font-bold ${task.completed ? 'line-through opacity-60' : ''}`}>{task.title}</p>

                              </div>
                              <p className={`text-sm font-black ${highContrast ? 'text-yellow-400' : 'text-indigo-600'}`}>
                                תגמול: ₪{task.reward}
                                {task.isRecurring && <span className="text-xs font-normal opacity-80 mr-2 border-r border-current pr-2">משימה מתחדשת</span>}
                              </p>
                            </div>
                          </div>
                          <div className="flex items-center justify-end gap-3">
                            {viewMode === 'parent' && (
                              <>
                                {!task.approved && task.completed && <button onClick={() => toggleTaskApproval(task)} className={`min-h-[44px] px-5 rounded-xl font-bold animate-pulse ${highContrast ? 'bg-yellow-400 text-black' : 'bg-green-500 text-white'}`}>אישור ותשלום!</button>}

                                <button onClick={() => openModal('deleteTask', task)} className="min-w-[44px] min-h-[44px] flex items-center justify-center text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-xl"><Trash2 size={20} /></button>
                              </>
                            )}
                            {task.approved && viewMode === 'child' && <div className="flex items-center gap-2 bg-green-100 text-green-700 dark:bg-green-900/50 dark:text-green-300 px-4 py-2 rounded-xl font-black"><Trophy size={18} /> אושר</div>}

                          </div>
                        </div>
                      ))

                  </div>
                </div>

                    {viewMode === 'child' && <button onClick={() => openModal('addGoal')} className={`min-h-[44px] px-4 rounded-xl font-bold flex items-center gap-2 ${highContrast ? 'bg-yellow-400 text-black' : 'bg-indigo-100 text-indigo-700'}`}><Plus size={18} /> יעד חדש</button>}
                  </div>

                  <div className="space-y-4">
                    {sortedGoals.length === 0 && viewMode === 'child' && <button onClick={() => openModal('addGoal')} className={`w-full py-6 rounded-3xl border-2 border-dashed font-bold ${highContrast ? 'border-yellow-400 text-yellow-400' : 'border-indigo-300 text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-900/20'}`}>הוסיפי משהו שתרצי לקנות!</button>}
                    {sortedGoals.map(goal => {
                      const balance = activeProfile && activeProfile.balance ? activeProfile.balance : 0;
                      const progressRaw = (balance / goal.target) * 100;
                      const progress = Math.min(100, Math.max(0, progressRaw));
                      const isReached = progress >= 100;

                      return (
                        <div key={goal.id} className={`p-6 rounded-[2rem] relative overflow-hidden ${cardClasses} ${isReached && !highContrast ? 'border-green-400 shadow-[0_0_15px_rgba(74,222,128,0.3)]' : ''}`}>
                          {viewMode === 'child' && <button onClick={() => openModal('deleteGoal', goal)} className="absolute top-4 left-4 p-2 text-gray-400 hover:text-red-500"><Trash2 size={16} /></button>}
                          <div className="pr-2">
                            <p className="font-bold text-lg mb-1">{goal.title}</p>
                            <div className="flex justify-between items-end mb-4">
                              <p className={`text-3xl font-black ${highContrast ? 'text-yellow-400' : 'text-indigo-600'}`}>₪{goal.target}</p>
                              <p className="font-bold">{Math.round(progress)}%</p>
                            </div>
                            <div className={`h-4 rounded-full overflow-hidden ${highContrast ? 'bg-gray-800 border border-yellow-400' : 'bg-gray-100 dark:bg-slate-700'}`}>

                            </div>
                            {isReached && <div className="mt-4 flex justify-center items-center gap-2 bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-300 py-2 rounded-xl font-black text-sm"><Trophy size={16} /> יש מספיק כסף!</div>}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                    <p className="text-sm opacity-90 leading-relaxed">המידע שלכם מסונכרן עכשיו בזמן אמת. הזינו את הקוד במכשירים נוספים כדי לחבר אותם.</p>
                    <div className="mt-2 p-4 rounded-xl bg-black/20 backdrop-blur-sm border border-white/10 text-center">
                      <p className="text-xs uppercase tracking-widest opacity-80 mb-1">קוד המשפחה שלכם</p>
                      <p className="text-3xl font-black tracking-widest">{familyId}</p>
                    </div>
                    <button onClick={copyShareLink} className="mt-2 w-full bg-white/20 hover:bg-white/30 py-3 rounded-xl text-sm font-bold transition-colors flex items-center justify-center gap-2">
                      <Copy size={16} /> העתקת קוד ושליחה
                    </button>
                  </div>
                </div>
              </div>
            </main>
          )}

          {modalConfig && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setModalConfig(null)}></div>
              <div className={`relative w-full max-w-sm p-6 rounded-[2rem] shadow-2xl ${highContrast ? 'bg-black border-2 border-yellow-400 text-yellow-400' : isDarkMode ? 'bg-slate-800 text-white' : 'bg-white text-gray-900'}`}>
                
                {modalConfig.type === 'joinFamily' && (
                  <form onSubmit={(e) => { e.preventDefault(); executeModalAction(); }}>
                    <div className="text-center mb-6">
                      <Users size={48} className={`mx-auto mb-4 ${highContrast ? 'text-yellow-400' : 'text-indigo-600'}`} />
                      <h3 className="text-xl font-black mb-2">הצטרפות למשפחה</h3>
                      <p className="text-sm opacity-80">בקשו מאחד ההורים את קוד המשפחה (מופיע במסך הראשי) והזינו אותו כאן.</p>
                    </div>
                    <input autoFocus required type="text" placeholder="לדוגמה: A1B2C3" value={modalInput1} onChange={e => setModalInput1(e.target.value)} className={modalInputClass} />
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="submit" className={modalSubmitBtn}>הצטרפות</button>
                    </div>
                  </form>
                )}

                {modalConfig.type === 'notifications' && (
                  <div className="flex flex-col h-[60vh] max-h-[500px]">
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="text-xl font-black flex items-center gap-2"><Bell size={24} className={highContrast ? 'text-yellow-400' : 'text-indigo-600'} /> התראות</h3>
                      <button type="button" onClick={() => setModalConfig(null)} className="p-2 bg-gray-100 dark:bg-slate-700 rounded-full hover:bg-gray-200"><X size={20} /></button>
                    </div>
                    <div className="flex-1 overflow-y-auto space-y-3 pr-1">
                      {myNotifications.length === 0 ? <div className="text-center py-10 opacity-50 font-medium">אין התראות עדיין...</div> : myNotifications.map(n => (
                        <div key={n.id} className={`p-4 rounded-xl text-sm ${highContrast ? 'border border-yellow-400' : 'bg-gray-50 dark:bg-slate-700/50'}`}>
                          <p className="font-bold">{n.text}</p>
                          <p className="text-xs opacity-60 mt-1">{new Date(n.createdAt).toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'})}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {modalConfig.type === 'setPin' && (
                  <form onSubmit={(e) => { e.preventDefault(); executeModalAction(); }}>
                    <div className="text-center mb-6">
                      <Lock size={48} className={`mx-auto mb-4 ${highContrast ? 'text-yellow-400' : 'text-indigo-600'}`} />
                      <h3 className="text-xl font-black mb-2">קוד אזור הורים</h3>
                      <p className="text-sm opacity-80">זו הפעם הראשונה שאתם נכנסים. בחרו קוד בעל 4 ספרות כדי להגן על האישורים והתשלומים.</p>
                    </div>
                    <input autoFocus required type="password" inputMode="numeric" pattern="[0-9]{4}" maxLength={4} placeholder="0000" value={modalInput1} onChange={e => setModalInput1(e.target.value)} className={modalInputClass} />
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="submit" className={modalSubmitBtn}>שמירת קוד</button>
                    </div>
                  </form>
                )}

                {modalConfig.type === 'enterPin' && (
                  <form onSubmit={(e) => { e.preventDefault(); executeModalAction(); }}>
                    <div className="text-center mb-6">
                      <Lock size={48} className={`mx-auto mb-4 ${highContrast ? 'text-yellow-400' : 'text-indigo-600'}`} />
                      <h3 className="text-xl font-black mb-2">אזור הורים</h3>
                      <p className="text-sm opacity-80">אנא הזינו את קוד האבטחה (4 ספרות) כדי להמשיך.</p>
                    </div>
                    <input autoFocus required type="password" inputMode="numeric" pattern="[0-9]{4}" maxLength={4} placeholder="****" value={modalInput1} onChange={e => setModalInput1(e.target.value)} className={modalInputClass} />
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="submit" className={modalSubmitBtn}>כניסה</button>
                    </div>
                  </form>
                )}

                {modalConfig.type === 'addChild' && (
                  <form onSubmit={(e) => { e.preventDefault(); executeModalAction(); }}>
                    <h3 className="text-xl font-black mb-4">הוספת פרופיל</h3>
                    <input autoFocus required placeholder="שם הפרופיל?" value={modalInput1} onChange={e => setModalInput1(e.target.value)} className={modalTextInputClass} />
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="submit" className={modalSubmitBtn}>יצירת פרופיל</button>
                    </div>
                  </form>
                )}

                {modalConfig.type === 'addTask' && (
                  <form onSubmit={(e) => { e.preventDefault(); executeModalAction(); }}>
                    <h3 className="text-xl font-black mb-4">משימה חדשה</h3>
                    <input autoFocus required placeholder="מה המשימה?" value={modalInput1} onChange={e => setModalInput1(e.target.value)} className={`${modalTextInputClass} mb-3`} />
                    <input required type="number" min="1" placeholder="תגמול בשקלים (למשל: 10)" value={modalInput2} onChange={e => setModalInput2(e.target.value)} className={modalTextInputClass} />
                    <div className={`flex items-center gap-3 mt-4 mb-2 p-4 rounded-xl border-2 transition-colors ${highContrast ? 'border-yellow-400' : 'border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700/50'}`}>
                      <button type="button" onClick={() => setModalInput3(!modalInput3)} className={`w-12 h-6 rounded-full relative transition-colors ${modalInput3 ? (highContrast ? 'bg-yellow-400' : 'bg-indigo-600') : 'bg-gray-300 dark:bg-slate-600'}`}>
                        <div className={`absolute top-1 w-4 h-4 rounded-full transition-all bg-white ${modalInput3 ? 'translate-x-6' : 'translate-x-1'}`} style={{left: 0}}></div>
                      </button>
                      <div>
                        <p className="font-bold text-sm">משימה מתחדשת</p>
                        <p className="text-[10px] opacity-70">לאחר אישור, המשימה תתאפס למחר.</p>
                      </div>
                    </div>
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="submit" className={modalSubmitBtn}>יצירת משימה</button>
                    </div>
                  </form>
                )}

                {modalConfig.type === 'addGoal' && (
                  <form onSubmit={(e) => { e.preventDefault(); executeModalAction(); }}>
                    <h3 className="text-xl font-black mb-4">יעד חיסכון חדש</h3>
                    <input autoFocus required placeholder="מה תרצו לקנות?" value={modalInput1} onChange={e => setModalInput1(e.target.value)} className={`${modalTextInputClass} mb-3`} />
                    <input required type="number" min="1" placeholder="כמה זה עולה?" value={modalInput2} onChange={e => setModalInput2(e.target.value)} className={modalTextInputClass} />
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="submit" className={modalSubmitBtn}>הוספת יעד</button>
                    </div>
                  </form>
                )}

                {(modalConfig.type === 'deleteTask' || modalConfig.type === 'deleteGoal') && (
                  <div>
                    <h3 className="text-xl font-black mb-4 text-center">האם למחוק?</h3>
                    <p className="mb-6 text-center opacity-80">הפעולה תמחק את הפריט לצמיתות.</p>
                    <div className="flex gap-3">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="button" onClick={executeModalAction} className={`flex-1 py-3 rounded-xl font-bold text-white transition-transform active:scale-95 ${highContrast ? 'bg-red-600 border border-yellow-400' : 'bg-red-500 shadow-lg shadow-red-200 hover:bg-red-600'}`}>למחוק עכשיו</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {isAccessMenuOpen && (
            <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center p-0 md:p-4">
              <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={() => setIsAccessMenuOpen(false)}></div>
              <div className={`relative w-full max-w-md p-8 rounded-t-[2.5rem] md:rounded-[2.5rem] shadow-2xl ${highContrast ? 'bg-black border-2 border-yellow-400' : isDarkMode ? 'bg-slate-800 text-white' : 'bg-white text-gray-900'}`}>
                <div className="flex justify-between items-center mb-8">
                  <h2 className="text-2xl font-black flex items-center gap-3"><Accessibility size={28} className={highContrast ? 'text-yellow-400' : 'text-indigo-600'} /> הגדרות נגישות</h2>
                  <button onClick={() => setIsAccessMenuOpen(false)} className={`min-w-[44px] min-h-[44px] flex items-center justify-center rounded-full ${highContrast ? 'border border-yellow-400' : 'bg-gray-100 dark:bg-slate-700'}`}><X size={24} /></button>
                </div>
                <div className="space-y-8">
                  <div>
                    <p className="font-bold mb-3 text-lg">גודל טקסט</p>
                    <div className="flex gap-3">
                      {[14, 16, 20, 24].map(size => (
                        <button key={size} onClick={() => setFontSize(size)} className={`flex-1 min-h-[54px] rounded-2xl font-bold border-2 transition-colors ${fontSize === size ? (highContrast ? 'bg-yellow-400 text-black border-yellow-400' : 'bg-indigo-100 text-indigo-700 border-indigo-600') : (highContrast ? 'border-yellow-400 text-yellow-400' : 'border-gray-200 dark:border-slate-600')}`}>
                          {size === 16 ? 'רגיל' : size > 16 ? 'גדול' : 'קטן'}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className={`flex justify-between items-center p-5 rounded-2xl border-2 ${highContrast ? 'border-yellow-400' : 'border-gray-200 dark:border-slate-700'}`}>
                    <div><p className="font-bold text-lg">ניגודיות גבוהה (WCAG)</p><p className="text-sm opacity-75">שחור וצהוב לקריאות מקסימלית</p></div>
                    <button onClick={() => setHighContrast(!highContrast)} className={`w-16 h-8 rounded-full relative transition-colors ${highContrast ? 'bg-yellow-400' : 'bg-gray-300 dark:bg-slate-600'}`}>
                      <div className={`absolute top-1 w-6 h-6 rounded-full transition-all ${highContrast ? 'right-9 bg-black' : 'right-1 bg-white'}`}></div>
                    </button>
                  </div>
                </div>
                <button onClick={() => setIsAccessMenuOpen(false)} className={`w-full mt-8 min-h-[54px] rounded-2xl font-black text-lg ${highContrast ? 'bg-yellow-400 text-black' : 'bg-indigo-600 text-white shadow-lg'}`}>שמירה והמשך</button>
              </div>
            </div>
          )}

          {activeProfileId && (
            <div className={`md:hidden fixed bottom-0 left-0 right-0 p-3 border-t backdrop-blur-lg pb-safe flex justify-around items-center z-30 ${highContrast ? 'bg-black border-yellow-400' : isDarkMode ? 'bg-slate-900/90 border-slate-700' : 'bg-white/90 border-gray-200'}`}>
              <button onClick={() => setViewMode('child')} className={`flex flex-col items-center justify-center min-w-[64px] min-h-[44px] gap-1 ${viewMode === 'child' ? (highContrast ? 'text-yellow-400' : 'text-indigo-600') : 'text-gray-400'}`}>
                <UserCircle size={24} />
                <span className="text-[10px] font-bold">תצוגת ילד/ה</span>
              </button>
              <button onClick={() => { openModal('notifications'); markNotificationsAsRead(); }} className={`relative flex flex-col items-center justify-center min-w-[64px] min-h-[44px] gap-1 text-gray-400`}>
                <div className="relative">
                  <Bell size={24} />
                  {unreadCount > 0 && <span className="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white dark:border-slate-900"></span>}
                </div>
                <span className="text-[10px] font-bold">התראות</span>
              </button>
              <button onClick={handleParentModeRequest} className={`flex flex-col items-center justify-center min-w-[64px] min-h-[44px] gap-1 ${viewMode === 'parent' ? (highContrast ? 'text-yellow-400' : 'text-indigo-600') : 'text-gray-400'}`}>
                <div className="relative">
                  <Settings size={24} />
                  {viewMode === 'child' && <Lock size={10} className="absolute -bottom-1 -right-1 bg-white dark:bg-slate-900 rounded-full" />}
                </div>
                <span className="text-[10px] font-bold">תצוגת הורה</span>
              </button>
            </div>
          )}
        </div>
      );
    };

    const rootElement = document.getElementById('root');
    rootElement.innerHTML = '';
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>

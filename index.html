<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>דמי כיס - חינוך פיננסי למשפחה</title>
  <meta name="theme-color" content="#4F46E5" />
  
  <script>
    window.addEventListener('error', function(e) {
      document.getElementById('root').innerHTML = '<div style="color:#721c24; background:#f8d7da; border:1px solid #f5c6cb; padding:20px; margin:20px; border-radius:10px; font-size:16px; direction:ltr; text-align:left; font-family:monospace; line-height:1.5;"><b>שגיאת מערכת (Error):</b><br/><br/>' + (e.message || 'Unknown Error') + '</div>';
    });
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin="anonymous" src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>

  <script crossorigin="anonymous" src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script crossorigin="anonymous" src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <script crossorigin="anonymous" src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
  
  <div id="root">
    <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; gap:16px;">
      <div style="width:50px; height:50px; border:5px solid #4F46E5; border-bottom-color:transparent; border-radius:50%; animation: spin 1s linear infinite;"></div>
      <div style="font-family:sans-serif; font-weight:bold; color:#4F46E5; font-size:20px; text-align:center;">
        מתחבר לענן וטוען אפליקציה...
      </div>
      <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
    </div>
  </div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo, useRef } = window.React;
    const { createRoot } = window.ReactDOM;

    // --- חיבור למסד הנתונים ---
    const firebaseConfig = {
      apiKey: "AIzaSyCFfeIHcPMrsMgi_Jtwys-L352h8RSSqig",
      authDomain: "pocket-money-e1b90.firebaseapp.com",
      projectId: "pocket-money-e1b90",
      storageBucket: "pocket-money-e1b90.firebasestorage.app",
      messagingSenderId: "793039825028",
      appId: "1:793039825028:web:eda4bc6f1f0cf603e57ad1"
    };

    if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
    const auth = window.firebase.auth(); auth.languageCode = 'he'; 
    const db = window.firebase.firestore();
    const appId = 'pocket-money-2025';

    // מאגר אימוג'ים לבחירה
    const EMOJIS = ['⭐', '🧹', '🛏️', '🍽️', '🐶', '📚', '👕', '🎮', '⚽', '🎨', '📱', '🚲', '🍿', '🍔', '👗', '✨'];

    // --- מערכת אייקונים ---
    const Icon = ({ name, size = 24, className = "" }) => (
      <i className={`${name} ${className}`} style={{ fontSize: `${size}px`, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: `${size}px`, height: `${size}px` }}></i>
    );

    const Wallet = (p) => <Icon name="fas fa-wallet" {...p} />;
    const Target = (p) => <Icon name="fas fa-bullseye" {...p} />;
    const ListChecks = (p) => <Icon name="fas fa-tasks" {...p} />;
    const Accessibility = (p) => <Icon name="fas fa-universal-access" {...p} />;
    const Plus = (p) => <Icon name="fas fa-plus" {...p} />;
    const Minus = (p) => <Icon name="fas fa-minus" {...p} />;
    const HistoryIcon = (p) => <Icon name="fas fa-history" {...p} />;
    const EditIcon = (p) => <Icon name="fas fa-pen" {...p} />;
    const ShieldCheck = (p) => <Icon name="fas fa-shield-alt" {...p} />;
    const Sun = (p) => <Icon name="fas fa-sun" {...p} />;
    const Moon = (p) => <Icon name="fas fa-moon" {...p} />;
    const CheckCircle2 = (p) => <Icon name="fas fa-check-circle" {...p} />;
    const Circle = (p) => <Icon name="far fa-circle" {...p} />;
    const Trash2 = (p) => <Icon name="fas fa-trash-alt" {...p} />;
    const UserCircle = (p) => <Icon name="fas fa-user-circle" {...p} />;
    const Settings = (p) => <Icon name="fas fa-cog" {...p} />;
    const AlertCircle = (p) => <Icon name="fas fa-exclamation-circle" {...p} />;
    const Trophy = (p) => <Icon name="fas fa-trophy" {...p} />;
    const X = (p) => <Icon name="fas fa-times" {...p} />;
    const Users = (p) => <Icon name="fas fa-users" {...p} />;
    const UserPlus = (p) => <Icon name="fas fa-user-plus" {...p} />;
    const Lock = (p) => <Icon name="fas fa-lock" {...p} />;
    const Repeat = (p) => <Icon name="fas fa-redo" {...p} />;
    const Share2 = (p) => <Icon name="fas fa-share-alt" {...p} />;
    const Copy = (p) => <Icon name="fas fa-copy" {...p} />;
    const Bell = (p) => <Icon name="fas fa-bell" {...p} />;
    const Download = (p) => <Icon name="fas fa-download" {...p} />;
    const PiggyBank = (p) => <Icon name="fas fa-piggy-bank" {...p} />;

    const Toast = ({ message, type, onClose }) => {
      if (!message) return null;
      const bgColor = type === 'error' ? 'bg-red-500' : 'bg-green-500';
      return (
        <div className={`fixed bottom-24 md:bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white font-bold shadow-xl z-50 flex items-center gap-3 animate-bounce ${bgColor}`} dir="rtl">
          {type === 'error' ? <AlertCircle size={20} /> : <CheckCircle2 size={20} />}
          <span>{message}</span>
          <button onClick={onClose} className="p-1 hover:bg-white/20 rounded-full mr-2"><X size={16} /></button>
        </div>
      );
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [familyId, setFamilyId] = useState('');
      const [profiles, setProfiles] = useState([]);
      const [allTasks, setAllTasks] = useState([]);
      const [allGoals, setAllGoals] = useState([]);
      const [allNotifications, setAllNotifications] = useState([]);
      const [allTransactions, setAllTransactions] = useState([]); 
      
      const [activeProfileId, setActiveProfileId] = useState(() => localStorage.getItem('pocketMoneyActiveProfile') || null);
      const [securitySettings, setSecuritySettings] = useState({});
      
      const [isReady, setIsReady] = useState(false);
      const [toast, setToast] = useState({ message: '', type: '' });

      const [modalConfig, setModalConfig] = useState(null);
      const [modalInput1, setModalInput1] = useState('');
      const [modalInput2, setModalInput2] = useState('');
      const [modalInput3, setModalInput3] = useState(false);
      const [selectedEmoji, setSelectedEmoji] = useState('⭐');

      const [isDarkMode, setIsDarkMode] = useState(false);
      const [highContrast, setHighContrast] = useState(false);
      const [fontSize, setFontSize] = useState(16);
      const [isAccessMenuOpen, setIsAccessMenuOpen] = useState(false);
      const [viewMode, setViewMode] = useState('child'); 

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast({ message: '', type: '' }), 4000);
      };

      const fireConfetti = () => {
        if (window.confetti) {
          window.confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, zIndex: 9999 });
        }
      };

      const logTransaction = async (childId, amount, type, description) => {
        if (!familyId) return;
        await db.collection(`artifacts/${appId}/public/data/transactions`).add({
          familyId, childId, amount, type, description, createdAt: Date.now()
        });
      };

      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const fidFromUrl = urlParams.get('familyId');
        const fidFromStorage = localStorage.getItem('pocketMoneyFamilyId');
        let finalFid = fidFromUrl || fidFromStorage;
        if (!finalFid) finalFid = Math.random().toString(36).substring(2, 8).toUpperCase();
        localStorage.setItem('pocketMoneyFamilyId', finalFid);
        try { window.history.replaceState(null, '', '?familyId=' + finalFid); } catch (e) {}
        setFamilyId(finalFid);
      }, []);

      useEffect(() => {
        if (activeProfileId) localStorage.setItem('pocketMoneyActiveProfile', activeProfileId);
        else localStorage.removeItem('pocketMoneyActiveProfile');
      }, [activeProfileId]);

      useEffect(() => {
        const initAuth = async () => {
          try { await auth.signInAnonymously(); } catch (error) { setIsReady(true); }
        };
        initAuth();
        const unsubscribeAuth = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser); if (!currentUser) setIsReady(true);
        });
        return () => unsubscribeAuth();
      }, []);

      useEffect(() => {
        if (!user || !familyId) return;

        const securityRef = db.doc(`artifacts/${appId}/public/data/security/${familyId}`);
        const unsubSec = securityRef.onSnapshot(s => setSecuritySettings(s.exists ? s.data() : {}));

        const profilesCol = db.collection(`artifacts/${appId}/public/data/profiles`);
        const unsubProf = profilesCol.onSnapshot(s => {
          setProfiles(s.docs.map(d => Object.assign({ id: d.id }, d.data())).filter(i => i.familyId === familyId));
          setIsReady(true);
        }, () => setIsReady(true));

        const tasksCol = db.collection(`artifacts/${appId}/public/data/tasks`);
        const unsubTasks = tasksCol.onSnapshot(s => setAllTasks(s.docs.map(d => Object.assign({ id: d.id }, d.data())).filter(i => i.familyId === familyId)));

        const goalsCol = db.collection(`artifacts/${appId}/public/data/goals`);
        const unsubGoals = goalsCol.onSnapshot(s => setAllGoals(s.docs.map(d => Object.assign({ id: d.id }, d.data())).filter(i => i.familyId === familyId)));

        const notifCol = db.collection(`artifacts/${appId}/public/data/notifications`);
        const unsubNotif = notifCol.onSnapshot(s => setAllNotifications(s.docs.map(d => Object.assign({ id: d.id }, d.data())).filter(i => i.familyId === familyId)));

        const transCol = db.collection(`artifacts/${appId}/public/data/transactions`);
        const unsubTrans = transCol.onSnapshot(s => setAllTransactions(s.docs.map(d => Object.assign({ id: d.id }, d.data())).filter(i => i.familyId === familyId)));

        return () => { unsubSec(); unsubProf(); unsubTasks(); unsubGoals(); unsubNotif(); unsubTrans(); };
      }, [user, familyId]);

      const activeProfile = profiles.find(p => p.id === activeProfileId);
      const tasks = allTasks.filter(t => t.childId === activeProfileId);
      const goals = allGoals.filter(g => g.childId === activeProfileId);
      const myTransactions = allTransactions.filter(t => t.childId === activeProfileId).sort((a, b) => b.createdAt - a.createdAt);

      const sortedProfiles = useMemo(() => [...profiles].sort((a, b) => a.createdAt - b.createdAt), [profiles]);
      const sortedTasks = useMemo(() => [...tasks].sort((a, b) => b.createdAt - a.createdAt), [tasks]);
      const sortedGoals = useMemo(() => [...goals].sort((a, b) => b.createdAt - a.createdAt), [goals]);

      const myNotifications = useMemo(() => 
        allNotifications.filter(n => viewMode === 'parent' ? n.target === 'parent' : n.target === activeProfileId)
        .sort((a, b) => b.createdAt - a.createdAt), [allNotifications, viewMode, activeProfileId]
      );
      const unreadCount = useMemo(() => myNotifications.filter(n => !n.isRead).length, [myNotifications]);

      const notify = async (text, target) => {
        if (!user || !familyId) return;
        await db.collection(`artifacts/${appId}/public/data/notifications`).add({ familyId, text, target, isRead: false, createdAt: Date.now() });
      };

      const markNotificationsAsRead = () => {
        const unread = myNotifications.filter(n => !n.isRead);
        Promise.all(unread.map(n => db.doc(`artifacts/${appId}/public/data/notifications/${n.id}`).update({ isRead: true })));
      };

      const copyShareLink = async () => {
        let currentUrl = window.location.href;
        const urlObj = new URL(currentUrl);
        urlObj.searchParams.set('familyId', familyId);
        currentUrl = urlObj.toString();
        const shareText = `הצטרפו אליי לאפליקציית דמי כיס! 💸\nקוד המשפחה שלנו הוא: ${familyId}\n\nלכניסה לחצו כאן:\n${currentUrl}`;
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) { await navigator.clipboard.writeText(shareText); showToast("הקישור הועתק!", "success"); }
          else {
            const ta = document.createElement("textarea"); ta.value = shareText; ta.style.cssText = "position:fixed;left:-9999px;top:-9999px";
            document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
            showToast("הקישור הועתק!", "success");
          }
        } catch (err) { showToast("שגיאה בהעתקת הקישור", "error"); }
      };

      const handleParentModeRequest = () => {
        if (viewMode === 'parent') return; 
        if (!securitySettings.parentPin) openModal('setPin'); else openModal('enterPin'); 
      };

      const openModal = (type, data = null) => {
        if (type === 'editTask' || type === 'editGoal') {
          setModalInput1(data.title);
          setModalInput2(data.reward || data.target);
          setModalInput3(data.isRecurring || false);
          setSelectedEmoji(data.emoji || '⭐');
        } else {
          setModalInput1(''); setModalInput2(''); setModalInput3(false); setSelectedEmoji('⭐');
        }
        setModalConfig({ type, data });
      };

      const executeModalAction = async () => {
        if (!user || !familyId) return;
        const type = modalConfig.type; const data = modalConfig.data;
        const input1 = modalInput1.trim(); const input2 = modalInput2; const input3 = modalInput3; const emoji = selectedEmoji;
        
        try {
          if (type === 'joinFamily') {
            const code = input1.toUpperCase();
            if (!code || code.length < 3) return showToast("אנא הזינו קוד תקין", "error");
            setModalConfig(null); 
            localStorage.setItem('pocketMoneyFamilyId', code); localStorage.removeItem('pocketMoneyActiveProfile'); setActiveProfileId(null); setFamilyId(code);
            try { window.history.replaceState(null, '', '?familyId=' + code); } catch (e) {}
            showToast("מתחבר למשפחה...", "success"); return;
          }

          if (type === 'setPin') {
            if (input1.length !== 4 || isNaN(Number(input1))) return showToast("הקוד חייב לכלול 4 ספרות בדיוק", "error");
            setModalConfig(null); await db.doc(`artifacts/${appId}/public/data/security/${familyId}`).set({ parentPin: input1 }); setViewMode('parent'); showToast("קוד ההורה הוגדר בהצלחה!"); return;
          }

          if (type === 'enterPin') {
            if (input1 === securitySettings.parentPin) { setModalConfig(null); setViewMode('parent'); showToast("התחברת בהצלחה לתצוגת הורה!"); }
            else return showToast("קוד שגוי, נסו שוב", "error"); return;
          }

          if (type === 'addChild') {
            if (!input1) return showToast("השם לא יכול להיות ריק", "error");
            setModalConfig(null);
            const newProfileRef = await db.collection(`artifacts/${appId}/public/data/profiles`).add({ familyId, name: input1, balance: 0, createdAt: Date.now() });
            setActiveProfileId(newProfileRef.id); showToast(`הפרופיל של ${input1} נוצר בהצלחה!`); return;
          } 
          
          if (type === 'addTask' || type === 'editTask') {
            const reward = Number(input2);
            if (!input1) return showToast("שם המשימה לא יכול להיות ריק", "error");
            if (isNaN(reward) || reward <= 0) return showToast("התגמול חייב להיות מספר חיובי", "error");
            setModalConfig(null);
            const payload = { familyId, childId: activeProfileId, title: input1, reward: reward, isRecurring: !!input3, emoji };
            if (type === 'addTask') {
              payload.completed = false; payload.approved = false; payload.createdAt = Date.now();
              await db.collection(`artifacts/${appId}/public/data/tasks`).add(payload);
              notify(`משימה חדשה ממתינה לביצוע: "${input1}" (₪${reward})`, activeProfileId);
              showToast("המשימה נשמרה בהצלחה!");
            } else {
              await db.doc(`artifacts/${appId}/public/data/tasks/${data.id}`).update(payload);
              showToast("המשימה עודכנה בהצלחה!");
            }
            return;
          }

          if (type === 'addGoal' || type === 'editGoal') {
            const target = Number(input2);
            if (!input1) return showToast("שם היעד לא יכול להיות ריק", "error");
            if (isNaN(target) || target <= 0) return showToast("המחיר חייב להיות מספר חיובי", "error");
            setModalConfig(null);
            const payload = { familyId, childId: activeProfileId, title: input1, target: target, emoji };
            if (type === 'addGoal') {
              payload.currentAmount = 0; payload.createdAt = Date.now();
              await db.collection(`artifacts/${appId}/public/data/goals`).add(payload);
              showToast("יעד חיסכון חדש נוסף!");
            } else {
              await db.doc(`artifacts/${appId}/public/data/goals/${data.id}`).update(payload);
              showToast("היעד עודכן בהצלחה!");
            }
            return;
          }

          if (type === 'fundGoal') {
            const amountToFund = Number(input1);
            if (isNaN(amountToFund) || amountToFund <= 0) return showToast("סכום הפקדה לא תקין", "error");
            if (amountToFund > activeProfile.balance) return showToast("הסכום גדול מהיתרה הנוכחית", "error");
            
            setModalConfig(null);
            const newBalance = activeProfile.balance - amountToFund;
            const newGoalSaved = (data.currentAmount || 0) + amountToFund;
            
            await db.doc(`artifacts/${appId}/public/data/profiles/${activeProfileId}`).update({ balance: newBalance });
            await db.doc(`artifacts/${appId}/public/data/goals/${data.id}`).update({ currentAmount: newGoalSaved });
            await logTransaction(activeProfileId, -amountToFund, 'goal_funded', `הפקדה ליעד: ${data.emoji} ${data.title}`);
            
            showToast("הכסף הופקד לקופה!");
            if (newGoalSaved >= data.target) fireConfetti(); 
            return;
          }

          if (type === 'withdrawBalance') {
            const amountToWithdraw = Number(input1);
            if (isNaN(amountToWithdraw) || amountToWithdraw <= 0) return showToast("סכום הפחתה לא תקין", "error");
            if (amountToWithdraw > activeProfile.balance) return showToast("אי אפשר להפחית יותר כסף ממה שיש ביתרה", "error");
            
            setModalConfig(null);
            const newBalance = activeProfile.balance - amountToWithdraw;
            await db.doc(`artifacts/${appId}/public/data/profiles/${activeProfileId}`).update({ balance: newBalance });
            await logTransaction(activeProfileId, -amountToWithdraw, 'withdraw', 'משיכת הורה / קיזוז');
            showToast(`היתרה הופחתה ב-₪${amountToWithdraw}.`);
            return;
          }

          if (type === 'deleteTask') {
            setModalConfig(null);
            await db.doc(`artifacts/${appId}/public/data/tasks/${data.id}`).delete();
            showToast("המשימה נמחקה");
            return;
          }

          if (type === 'deleteGoal') {
            setModalConfig(null);
            if (data.currentAmount && data.currentAmount > 0) {
              const returnedBalance = activeProfile.balance + data.currentAmount;
              await db.doc(`artifacts/${appId}/public/data/profiles/${activeProfileId}`).update({ balance: returnedBalance });
              await logTransaction(activeProfileId, data.currentAmount, 'refund', `ביטול יעד (החזר): ${data.title}`);
              showToast("היעד נמחק והכסף חזר ליתרה!");
            } else {
              showToast("היעד נמחק");
            }
            await db.doc(`artifacts/${appId}/public/data/goals/${data.id}`).delete();
            return;
          }
        } catch (error) { setModalConfig(null); showToast("שגיאה בענן.", "error"); }
      };

      const toggleTaskCompletion = async (task) => {
        if (!user || viewMode !== 'child') return;
        if (task.approved) return showToast("המשימה כבר אושרה ושולמה, לא ניתן לשנות.", "error");
        try {
          const isNowCompleted = !task.completed;
          await db.doc(`artifacts/${appId}/public/data/tasks/${task.id}`).update({ completed: isNowCompleted });
          const profileName = activeProfile ? activeProfile.name : '';
          if (isNowCompleted) notify(`${profileName} סיים/ה את המשימה "${task.title}" וממתין/ה לאישור!`, 'parent');
        } catch (error) { showToast("שגיאה בעדכון", "error"); }
      };

      const toggleTaskApproval = async (task) => {
        if (!user || viewMode !== 'parent' || !activeProfile) return;
        if (!task.completed && !task.approved) return showToast("לא ניתן לאשר משימה שטרם בוצעה.", "error");

        try {
          const taskRef = db.doc(`artifacts/${appId}/public/data/tasks/${task.id}`);
          const profileRef = db.doc(`artifacts/${appId}/public/data/profiles/${task.childId}`);
          
          if (!task.approved) {
            await profileRef.update({ balance: activeProfile.balance + task.reward });
            await logTransaction(task.childId, task.reward, 'task_approved', `השלמת משימה: ${task.emoji || ''} ${task.title}`);
            notify(`איזה יופי! המשימה "${task.title}" אושרה וקיבלתם ₪${task.reward}!`, task.childId);
            fireConfetti(); 
            
            if (task.isRecurring) {
              await taskRef.update({ completed: false, approved: false });
              showToast(`שולם ₪${task.reward} והמשימה התאפסה למחר!`);
            } else {
              await taskRef.update({ approved: true });
              showToast(`שולם ₪${task.reward} בהצלחה!`);
            }
          } else {
            await profileRef.update({ balance: Math.max(0, activeProfile.balance - task.reward) });
            await logTransaction(task.childId, -task.reward, 'task_cancelled', `ביטול משימה: ${task.title}`);
            await taskRef.update({ approved: false });

                            <p className="text-[10px] opacity-60 mt-1">{new Date(tx.createdAt).toLocaleString('he-IL', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</p>
                          </div>
                          <div className={`font-black text-lg flex-shrink-0 ${tx.amount > 0 ? 'text-green-500' : tx.amount < 0 ? 'text-red-500' : ''}`} dir="ltr">
                            {tx.amount > 0 ? '+' : ''}{tx.amount}₪
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {modalConfig.type === 'joinFamily' && (
                  <form onSubmit={(e) => { e.preventDefault(); executeModalAction(); }}>
                    <div className="text-center mb-6">
                      <Users size={48} className={`mx-auto mb-4 ${highContrast ? 'text-yellow-400' : 'text-indigo-600'}`} />
                      <h3 className="text-xl font-black mb-2">קוד משפחה</h3>
                      <p className="text-sm opacity-80">בקשו מאחד ההורים את קוד המשפחה (מופיע במסך הראשי) והזינו אותו כאן.</p>
                    </div>
                    <input autoFocus required type="text" placeholder="לדוגמה: A1B2C3" value={modalInput1} onChange={e => setModalInput1(e.target.value)} className={modalInputClass} />
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="submit" className={modalSubmitBtn}>התחברות</button>
                    </div>
                  </form>
                )}

                {modalConfig.type === 'notifications' && (
                  <div className="flex flex-col h-[60vh] max-h-[500px]">
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="text-xl font-black flex items-center gap-2"><Bell size={24} className={highContrast ? 'text-yellow-400' : 'text-indigo-600'} /> התראות</h3>
                      <button type="button" onClick={() => setModalConfig(null)} className="p-2 bg-gray-100 dark:bg-slate-700 rounded-full hover:bg-gray-200"><X size={20} /></button>
                    </div>
                    <div className="flex-1 overflow-y-auto space-y-3 pr-1">
                      {myNotifications.length === 0 ? <div className="text-center py-10 opacity-50 font-medium">אין התראות עדיין...</div> : myNotifications.map(n => (
                        <div key={n.id} className={`p-4 rounded-xl text-sm ${highContrast ? 'border border-yellow-400' : 'bg-gray-50 dark:bg-slate-700/50'}`}>
                          <p className="font-bold">{n.text}</p>
                          <p className="text-xs opacity-60 mt-1">{new Date(n.createdAt).toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'})}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {modalConfig.type === 'setPin' && (
                  <form onSubmit={(e) => { e.preventDefault(); executeModalAction(); }}>
                    <div className="text-center mb-6">
                      <Lock size={48} className={`mx-auto mb-4 ${highContrast ? 'text-yellow-400' : 'text-indigo-600'}`} />
                      <h3 className="text-xl font-black mb-2">קוד אזור הורים</h3>
                      <p className="text-sm opacity-80">זו הפעם הראשונה שאתם נכנסים. בחרו קוד בעל 4 ספרות כדי להגן על האישורים והתשלומים.</p>
                    </div>
                    <input autoFocus required type="password" inputMode="numeric" pattern="[0-9]{4}" maxLength={4} placeholder="0000" value={modalInput1} onChange={e => setModalInput1(e.target.value)} className={modalInputClass} />
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="submit" className={modalSubmitBtn}>שמירת קוד</button>
                    </div>
                  </form>
                )}

                {modalConfig.type === 'enterPin' && (
                  <form onSubmit={(e) => { e.preventDefault(); executeModalAction(); }}>
                    <div className="text-center mb-6">
                      <Lock size={48} className={`mx-auto mb-4 ${highContrast ? 'text-yellow-400' : 'text-indigo-600'}`} />
                      <h3 className="text-xl font-black mb-2">אזור הורים</h3>
                      <p className="text-sm opacity-80">הזינו קוד האבטחה כדי להמשיך.</p>
                    </div>
                    <input autoFocus required type="password" inputMode="numeric" pattern="[0-9]{4}" maxLength={4} placeholder="****" value={modalInput1} onChange={e => setModalInput1(e.target.value)} className={modalInputClass} />
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="submit" className={modalSubmitBtn}>כניסה</button>
                    </div>
                  </form>
                )}

                {modalConfig.type === 'addChild' && (
                  <form onSubmit={(e) => { e.preventDefault(); executeModalAction(); }}>
                    <h3 className="text-xl font-black mb-4">הוספת פרופיל</h3>
                    <input autoFocus required placeholder="שם הפרופיל?" value={modalInput1} onChange={e => setModalInput1(e.target.value)} className={modalTextInputClass} />
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="submit" className={modalSubmitBtn}>יצירת פרופיל</button>
                    </div>
                  </form>
                )}

                {(modalConfig.type === 'addTask' || modalConfig.type === 'editTask') && (
                  <form onSubmit={(e) => { e.preventDefault(); executeModalAction(); }}>
                    <h3 className="text-xl font-black mb-4">{modalConfig.type === 'addTask' ? 'משימה חדשה' : 'עריכת משימה'}</h3>
                    <div className="flex gap-2 overflow-x-auto py-2 mb-3 pb-2" style={{scrollbarWidth: 'none'}}>
                      {EMOJIS.map(e => (
                        <button type="button" key={e} onClick={() => setSelectedEmoji(e)} className={`flex-shrink-0 text-2xl p-2 rounded-xl border-2 transition-all ${selectedEmoji === e ? (highContrast ? 'border-yellow-400 bg-yellow-400/20' : 'border-indigo-600 bg-indigo-50 dark:bg-indigo-900/30') : 'border-transparent opacity-50 hover:opacity-100'}`}>{e}</button>
                      ))}
                    </div>
                    <input autoFocus required placeholder="מה המשימה?" value={modalInput1} onChange={e => setModalInput1(e.target.value)} className={`${modalTextInputClass} mb-3`} />
                    <input required type="number" min="1" placeholder="תגמול בשקלים (למשל: 10)" value={modalInput2} onChange={e => setModalInput2(e.target.value)} className={modalTextInputClass} />
                    <div className={`flex items-center gap-3 mt-4 mb-2 p-4 rounded-xl border-2 transition-colors ${highContrast ? 'border-yellow-400' : 'border-gray-200 dark:border-slate-600 bg-gray-50 dark:bg-slate-700/50'}`}>
                      <button type="button" onClick={() => setModalInput3(!modalInput3)} className={`w-12 h-6 rounded-full relative transition-colors ${modalInput3 ? (highContrast ? 'bg-yellow-400' : 'bg-indigo-600') : 'bg-gray-300 dark:bg-slate-600'}`}>
                        <div className={`absolute top-1 w-4 h-4 rounded-full transition-all bg-white ${modalInput3 ? 'translate-x-6' : 'translate-x-1'}`} style={{left: 0}}></div>
                      </button>
                      <div><p className="font-bold text-sm">משימה מתחדשת</p><p className="text-[10px] opacity-70">תתאפס למחר אחרי אישור.</p></div>
                    </div>
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="submit" className={modalSubmitBtn}>שמירה</button>
                    </div>
                  </form>
                )}

                {(modalConfig.type === 'addGoal' || modalConfig.type === 'editGoal') && (
                  <form onSubmit={(e) => { e.preventDefault(); executeModalAction(); }}>
                    <h3 className="text-xl font-black mb-4">{modalConfig.type === 'addGoal' ? 'יעד חיסכון חדש' : 'עריכת יעד'}</h3>
                    <div className="flex gap-2 overflow-x-auto py-2 mb-3 pb-2" style={{scrollbarWidth: 'none'}}>
                      {EMOJIS.map(e => (
                        <button type="button" key={e} onClick={() => setSelectedEmoji(e)} className={`flex-shrink-0 text-2xl p-2 rounded-xl border-2 transition-all ${selectedEmoji === e ? (highContrast ? 'border-yellow-400 bg-yellow-400/20' : 'border-indigo-600 bg-indigo-50 dark:bg-indigo-900/30') : 'border-transparent opacity-50 hover:opacity-100'}`}>{e}</button>
                      ))}
                    </div>
                    <input autoFocus required placeholder="מטרת החיסכון?" value={modalInput1} onChange={e => setModalInput1(e.target.value)} className={`${modalTextInputClass} mb-3`} />
                    <input required type="number" min="1" placeholder="כמה זה עולה?" value={modalInput2} onChange={e => setModalInput2(e.target.value)} className={modalTextInputClass} />
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="submit" className={modalSubmitBtn}>שמירה</button>
                    </div>
                  </form>
                )}

                {modalConfig.type === 'withdrawBalance' && (
                  <form onSubmit={(e) => { e.preventDefault(); executeModalAction(); }}>
                    <h3 className="text-xl font-black mb-4">קיזוז והפחתת יתרה</h3>
                    <p className="mb-4 opacity-80 text-sm">הזינו את הסכום שיש לקזז מהיתרה של {activeProfile?.name}:</p>
                    <input autoFocus required type="number" min="1" max={activeProfile?.balance || 0} placeholder={`מקסימום אפשרי: ₪${activeProfile?.balance || 0}`} value={modalInput1} onChange={e => setModalInput1(e.target.value)} className={modalTextInputClass} />
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="submit" className={`flex-1 py-3 rounded-xl font-bold text-white transition-transform active:scale-95 ${highContrast ? 'bg-red-600 border border-yellow-400' : 'bg-red-500 shadow-lg shadow-red-200 hover:bg-red-600'}`}>הפחתת סכום</button>
                    </div>
                  </form>
                )}

                {modalConfig.type === 'fundGoal' && (
                  <form onSubmit={(e) => { e.preventDefault(); executeModalAction(); }}>
                    <h3 className="text-xl font-black mb-4">הפקדה לקופה</h3>
                    <p className="mb-4 opacity-80 text-sm">כמה להעביר מהיתרה לטובת "{modalConfig.data?.title}"?</p>
                    <input autoFocus required type="number" min="1" max={activeProfile?.balance || 0} placeholder={`מקסימום אפשרי: ₪${activeProfile?.balance || 0}`} value={modalInput1} onChange={e => setModalInput1(e.target.value)} className={modalTextInputClass} />
                    <div className="flex gap-3 mt-6">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="submit" className={modalSubmitBtn}>הפקדה ליעד</button>
                    </div>
                  </form>
                )}

                {(modalConfig.type === 'deleteTask' || modalConfig.type === 'deleteGoal') && (
                  <div>
                    <h3 className="text-xl font-black mb-4 text-center">האם למחוק?</h3>
                    <p className="mb-6 text-center opacity-80">הפעולה תמחק את הפריט לצמיתות.</p>
                    <div className="flex gap-3">
                      <button type="button" onClick={() => setModalConfig(null)} className={modalCancelBtn}>ביטול</button>
                      <button type="button" onClick={executeModalAction} className={`flex-1 py-3 rounded-xl font-bold text-white transition-transform active:scale-95 ${highContrast ? 'bg-red-600 border border-yellow-400' : 'bg-red-500 shadow-lg shadow-red-200 hover:bg-red-600'}`}>למחוק עכשיו</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {isAccessMenuOpen && (
            <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center p-0 md:p-4">
              <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={() => setIsAccessMenuOpen(false)}></div>
              <div className={`relative w-full max-w-md p-8 rounded-t-[2.5rem] md:rounded-[2.5rem] shadow-2xl ${highContrast ? 'bg-black border-2 border-yellow-400' : isDarkMode ? 'bg-slate-800 text-white' : 'bg-white text-gray-900'}`}>
                <div className="flex justify-between items-center mb-8">
                  <h2 className="text-2xl font-black flex items-center gap-3"><Accessibility size={28} className={highContrast ? 'text-yellow-400' : 'text-indigo-600'} /> הגדרות נגישות</h2>
                  <button onClick={() => setIsAccessMenuOpen(false)} className={`min-w-[44px] min-h-[44px] flex items-center justify-center rounded-full ${highContrast ? 'border border-yellow-400' : 'bg-gray-100 dark:bg-slate-700'}`}><X size={24} /></button>
                </div>
                <div className="space-y-8">
                  <div>
                    <p className="font-bold mb-3 text-lg">גודל טקסט</p>
                    <div className="flex gap-3">
                      {[14, 16, 20, 24].map(size => (
                        <button key={size} onClick={() => setFontSize(size)} className={`flex-1 min-h-[54px] rounded-2xl font-bold border-2 transition-colors ${fontSize === size ? (highContrast ? 'bg-yellow-400 text-black border-yellow-400' : 'bg-indigo-100 text-indigo-700 border-indigo-600') : (highContrast ? 'border-yellow-400 text-yellow-400' : 'border-gray-200 dark:border-slate-600')}`}>
                          {size === 16 ? 'רגיל' : size > 16 ? 'גדול' : 'קטן'}
                        </button>
                      ))}
                    </div>
                  </div>
                  <div className={`flex justify-between items-center p-5 rounded-2xl border-2 ${highContrast ? 'border-yellow-400' : 'border-gray-200 dark:border-slate-700'}`}>
                    <div><p className="font-bold text-lg">ניגודיות גבוהה (WCAG)</p><p className="text-sm opacity-75">שחור וצהוב לקריאות מקסימלית</p></div>
                    <button onClick={() => setHighContrast(!highContrast)} className={`w-16 h-8 rounded-full relative transition-colors ${highContrast ? 'bg-yellow-400' : 'bg-gray-300 dark:bg-slate-600'}`}>
                      <div className={`absolute top-1 w-6 h-6 rounded-full transition-all ${highContrast ? 'right-9 bg-black' : 'right-1 bg-white'}`}></div>
                    </button>
                  </div>
                </div>
                <button onClick={() => setIsAccessMenuOpen(false)} className={`w-full mt-8 min-h-[54px] rounded-2xl font-black text-lg ${highContrast ? 'bg-yellow-400 text-black' : 'bg-indigo-600 text-white shadow-lg'}`}>שמירה והמשך</button>
              </div>
            </div>
          )}

          {activeProfileId && (
            <div className={`md:hidden fixed bottom-0 left-0 right-0 p-3 border-t backdrop-blur-lg pb-safe flex justify-around items-center z-30 ${highContrast ? 'bg-black border-yellow-400' : isDarkMode ? 'bg-slate-900/90 border-slate-700' : 'bg-white/90 border-gray-200'}`}>
              <button onClick={() => setViewMode('child')} className={`flex flex-col items-center justify-center min-w-[64px] min-h-[44px] gap-1 ${viewMode === 'child' ? (highContrast ? 'text-yellow-400' : 'text-indigo-600') : 'text-gray-400'}`}>
                <UserCircle size={24} />
                <span className="text-[10px] font-bold">תצוגת ילד/ה</span>
              </button>
              <button onClick={() => { openModal('notifications'); markNotificationsAsRead(); }} className={`relative flex flex-col items-center justify-center min-w-[64px] min-h-[44px] gap-1 text-gray-400`}>
                <div className="relative">
                  <Bell size={24} />
                  {unreadCount > 0 && <span className="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white dark:border-slate-900"></span>}
                </div>
                <span className="text-[10px] font-bold">התראות</span>
              </button>
              <button onClick={handleParentModeRequest} className={`flex flex-col items-center justify-center min-w-[64px] min-h-[44px] gap-1 ${viewMode === 'parent' ? (highContrast ? 'text-yellow-400' : 'text-indigo-600') : 'text-gray-400'}`}>
                <div className="relative">
                  <Settings size={24} />
                  {viewMode === 'child' && <Lock size={10} className="absolute -bottom-1 -right-1 bg-white dark:bg-slate-900 rounded-full" />}
                </div>
                <span className="text-[10px] font-bold">תצוגת הורה</span>
              </button>
            </div>
          )}
        </div>
      );
    };

    const rootElement = document.getElementById('root');
    rootElement.innerHTML = '';
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>

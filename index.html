<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>דמי כיס - האפליקציה של מאיה</title>
  <meta name="theme-color" content="#4F46E5" />
  
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      document.getElementById('root').innerHTML = '<div style="color:white; background:red; padding:20px; direction:ltr; text-align:left; font-family:monospace; margin:20px; border-radius:10px;"><b>Error:</b> ' + message + '<br/><b>Line:</b> ' + lineno + '</div>';
      return true;
    };
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" />
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.0/babel.min.js" crossorigin="anonymous"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.8.1/firebase-app-compat.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.8.1/firebase-firestore-compat.min.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.8.1/firebase-auth-compat.min.js" crossorigin="anonymous"></script>

  <style>
    body { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900">
  
  <div id="root">
    <div style="display:flex; justify-content:center; align-items:center; height:100vh; flex-direction:column; gap:16px;">
      <div style="width:50px; height:50px; border:5px solid #4F46E5; border-bottom-color:transparent; border-radius:50%; animation: spin 1s linear infinite;"></div>
      <div style="font-family:sans-serif; font-weight:bold; color:#4F46E5; font-size:20px; text-align:center;">
        מתחבר לענן...
      </div>
      <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = window.React;
    const { createRoot } = window.ReactDOM;

    const firebaseConfig = {
      apiKey: "AIzaSyCFfeIHcPMrsMgi_Jtwys-L352h8RSSqig",
      authDomain: "pocket-money-e1b90.firebaseapp.com",
      projectId: "pocket-money-e1b90",
      storageBucket: "pocket-money-e1b90.firebasestorage.app",
      messagingSenderId: "793039825028",
      appId: "1:793039825028:web:eda4bc6f1f0cf603e57ad1",
      measurementId: "G-NHL5SBQV56"
    };

    if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
    const auth = window.firebase.auth();
    auth.languageCode = 'he'; 
    const db = window.firebase.firestore();
    const appId = 'pocket-money-2025';

    const Icon = ({ name, size = 24, className = "" }) => (
      <i className={`${name} ${className}`} style={{ fontSize: `${size}px`, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: `${size}px`, height: `${size}px` }}></i>
    );

    const Wallet = (p) => <Icon name="fas fa-wallet" {...p} />;
    const Target = (p) => <Icon name="fas fa-bullseye" {...p} />;
    const ListChecks = (p) => <Icon name="fas fa-tasks" {...p} />;
    const Accessibility = (p) => <Icon name="fas fa-universal-access" {...p} />;
    const Plus = (p) => <Icon name="fas fa-plus" {...p} />;
    const ShieldCheck = (p) => <Icon name="fas fa-shield-alt" {...p} />;
    const Sun = (p) => <Icon name="fas fa-sun" {...p} />;
    const Moon = (p) => <Icon name="fas fa-moon" {...p} />;
    const Info = (p) => <Icon name="fas fa-info-circle" {...p} />;
    const CheckCircle2 = (p) => <Icon name="fas fa-check-circle" {...p} />;
    const Circle = (p) => <Icon name="far fa-circle" {...p} />;
    const Trash2 = (p) => <Icon name="fas fa-trash-alt" {...p} />;
    const UserCircle = (p) => <Icon name="fas fa-user-circle" {...p} />;
    const Settings = (p) => <Icon name="fas fa-cog" {...p} />;
    const AlertCircle = (p) => <Icon name="fas fa-exclamation-circle" {...p} />;
    const Trophy = (p) => <Icon name="fas fa-trophy" {...p} />;
    const X = (p) => <Icon name="fas fa-times" {...p} />;
    const Users = (p) => <Icon name="fas fa-users" {...p} />;
    const UserPlus = (p) => <Icon name="fas fa-user-plus" {...p} />;
    const Lock = (p) => <Icon name="fas fa-lock" {...p} />;
    const Repeat = (p) => <Icon name="fas fa-redo" {...p} />;
    const Share2 = (p) => <Icon name="fas fa-share-alt" {...p} />;
    const Copy = (p) => <Icon name="fas fa-copy" {...p} />;
    const Bell = (p) => <Icon name="fas fa-bell" {...p} />;

    const Toast = ({ message, type, onClose }) => {
      if (!message) return null;
      const bgColor = type === 'error' ? 'bg-red-500' : 'bg-green-500';
      return (
        <div className={`fixed bottom-24 md:bottom-10 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-white font-bold shadow-xl z-50 flex items-center gap-3 animate-bounce ${bgColor}`} dir="rtl">
          {type === 'error' ? <AlertCircle size={20} /> : <CheckCircle2 size={20} />}
          <span>{message}</span>
          <button onClick={onClose} className="p-1 hover:bg-white/20 rounded-full mr-2"><X size={16} /></button>
        </div>
      );
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [familyId, setFamilyId] = useState('');
      const [profiles, setProfiles] = useState([]);
      const [allTasks, setAllTasks] = useState([]);
      const [allGoals, setAllGoals] = useState([]);
      const [allNotifications, setAllNotifications] = useState([]);
      const [activeProfileId, setActiveProfileId] = useState(null);
      const [securitySettings, setSecuritySettings] = useState({});
      
      const [isReady, setIsReady] = useState(false);
      const [toast, setToast] = useState({ message: '', type: '' });

      const [modalConfig, setModalConfig] = useState(null);
      const [modalInput1, setModalInput1] = useState('');
      const [modalInput2, setModalInput2] = useState('');
      const [modalInput3, setModalInput3] = useState(false);

      const [isDarkMode, setIsDarkMode] = useState(false);
      const [highContrast, setHighContrast] = useState(false);
      const [fontSize, setFontSize] = useState(16);
      const [isAccessMenuOpen, setIsAccessMenuOpen] = useState(false);
      const [viewMode, setViewMode] = useState('child'); 

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast({ message: '', type: '' }), 4000);
      };

      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        let fid = urlParams.get('familyId');
        if (!fid) {
          fid = Math.random().toString(36).substring(2, 8).toUpperCase();
          try { window.history.replaceState(null, '', '?familyId=' + fid); } catch (e) {}
        }
        setFamilyId(fid);
      }, []);

      useEffect(() => {
        const initAuth = async () => {
          try { await auth.signInAnonymously(); } 
          catch (error) { showToast("שגיאת התחברות לחשבון", "error"); setIsReady(true); }
        };
        initAuth();
        
        const unsubscribeAuth = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          if (!currentUser) setIsReady(true);
        });
        return () => unsubscribeAuth();
      }, []);

      useEffect(() => {
        if (!user || !familyId) return;

        const securityRef = db.doc(`artifacts/${appId}/public/data/security/${familyId}`);
        const unsubscribeSecurity = securityRef.onSnapshot((docSnap) => {
          if (docSnap.exists) setSecuritySettings(docSnap.data());
          else setSecuritySettings({});
        });

        const profilesCol = db.collection(`artifacts/${appId}/public/data/profiles`);
        const unsubscribeProfiles = profilesCol.onSnapshot((snapshot) => {
          const items = snapshot.docs.map(d => Object.assign({ id: d.id }, d.data()));
          setProfiles(items.filter(i => i.familyId === familyId));
          setIsReady(true);
        }, (err) => { setIsReady(true); });

        const tasksCol = db.collection(`artifacts/${appId}/public/data/tasks`);
        const unsubscribeTasks = tasksCol.onSnapshot((snapshot) => {
          const items = snapshot.docs.map(d => Object.assign({ id: d.id }, d.data()));
          setAllTasks(items.filter(i => i.familyId === familyId));
        });

        const goalsCol = db.collection(`artifacts/${appId}/public/data/goals`);
        const unsubscribeGoals = goalsCol.onSnapshot((snapshot) => {
          const items = snapshot.docs.map(d => Object.assign({ id: d.id }, d.data()));
          setAllGoals(items.filter(i => i.familyId === familyId));
        });

        const notifCol = db.collection(`artifacts/${appId}/public/data/notifications`);
        const unsubscribeNotif = notifCol.onSnapshot((snapshot) => {
          const items = snapshot.docs.map(d => Object.assign({ id: d.id }, d.data()));
          setAllNotifications(items.filter(i => i.familyId === familyId));
        });

        return () => {
          unsubscribeSecurity(); unsubscribeProfiles(); unsubscribeTasks(); unsubscribeGoals(); unsubscribeNotif();
        };
      }, [user, familyId]);

      const activeProfile = profiles.find(p => p.id === activeProfileId);
      const tasks = allTasks.filter(t => t.childId === activeProfileId);
      const goals = allGoals.filter(g => g.childId === activeProfileId);

      const sortedProfiles = useMemo(() => [...profiles].sort((a, b) => a.createdAt - b.createdAt), [profiles]);
      const sortedTasks = useMemo(() => [...tasks].sort((a, b) => b.createdAt - a.createdAt), [tasks]);
      const sortedGoals = useMemo(() => [...goals].sort((a, b) => b.createdAt - a.createdAt), [goals]);

      const myNotifications = useMemo(() => 
        allNotifications.filter(n => viewMode === 'parent' ? n.target === 'parent' : n.target === activeProfileId)
        .sort((a, b) => b.createdAt - a.createdAt), [allNotifications, viewMode, activeProfileId]
      );
      const unreadCount = useMemo(() => myNotifications.filter(n => !n.isRead).length, [myNotifications]);

      const notify = async (text, target) => {
        if (!user || !familyId) return;
        await db.collection(`artifacts/${appId}/public/data/notifications`).add({
          familyId: familyId, text: text, target: target, isRead: false, createdAt: Date.now()
        });
      };

      const markNotificationsAsRead = () => {
        const unread = myNotifications.filter(n => !n.isRead);
        Promise.all(unread.map(n => db.doc(`artifacts/${appId}/public/data/notifications/${n.id}`).update({ isRead: true })));
      };

      const copyShareLink = async () => {
        let currentUrl = window.location.href;
        const url = new URL(currentUrl);
        url.searchParams.set('familyId', familyId);
        currentUrl = url.toString();
        
        const shareText = `הצטרפו אליי לאפליקציית דמי כיס! 💸\nקוד המשפחה שלנו הוא: ${familyId}\n\nלכניסה ישירה לחצו כאן:\n${currentUrl}`;
        
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(shareText);
            showToast("הקישור הועתק! שתפו בוואטסאפ 🔗", "success");
          } else {
            const ta = document.createElement("textarea");
            ta.value = shareText;
            ta.style.cssText = "position:fixed;left:-9999px;top:-9999px";
            document.body.appendChild(ta); ta.focus(); ta.select();
            document.execCommand('copy'); document.body.removeChild(ta);
            showToast("הקישור הועתק! שתפו בוואטסאפ 🔗", "success");
          }
        } catch (err) { showToast("שגיאה בהעתקת הקישור", "error"); }
      };

      const handleParentModeRequest = () => {
        if (viewMode === 'parent') return; 
        if (!securitySettings.parentPin) openModal('setPin'); 
        else openModal('enterPin'); 
      };

      const openModal = (type, data = null) => {
        setModalInput1(''); setModalInput2(''); setModalInput3(false); setModalConfig({ type: type, data: data });
      };

      const executeModalAction = async () => {
        if (!user || !familyId) return;
        const type = modalConfig.type;
        const data = modalConfig.data;
        const input1 = modalInput1.trim();
        const input2 = modalInput2;
        const input3 = modalInput3;
        
        try {
          if (type === 'joinFamily') {
            const code = input1.toUpperCase();
            if (!code || code.length < 3) return showToast("אנא הזינו קוד תקין", "error");
            setModalConfig(null); 
            setFamilyId(code);
            try { window.history.replaceState(null, '', '?familyId=' + code); } catch (e) {}
            showToast("מתחבר למשפחה...", "success");
            return;
          }

          if (type === 'setPin') {
            if (input1.length !== 4 || isNaN(Number(input1))) return showToast("הקוד חייב לכלול 4 ספרות בדיוק", "error");
            setModalConfig(null);
            await db.doc(`artifacts/${appId}/public/data/security/${familyId}`).set({ parentPin: input1 });
            setViewMode('parent');
            showToast("קוד ההורה הוגדר בהצלחה!");
            return;
          }

          if (type === 'enterPin') {
            if (input1 === securitySettings.parentPin) {
              setModalConfig(null);
              setViewMode('parent');
              showToast("התחברת בהצלחה לתצוגת הורה!");
            } else return showToast("קוד שגוי, נסו שוב", "error");
            return;
          }

          if (type === 'addChild') {
            if (!input1) return showToast("השם לא יכול להיות ריק", "error");
            setModalConfig(null);
            const newProfileRef = await db.collection(`artifacts/${appId}/public/data/profiles`).add({
              familyId: familyId, name: input1, balance: 0, createdAt: Date.now()
            });
            setActiveProfileId(newProfileRef.id);
            showToast(`הפרופיל של ${input1} נוצר בהצלחה!`);
            return;
          } 
          
          if (type === 'addTask') {
            const reward = Number(input2);
            if (!input1) return showToast("שם המשימה לא יכול להיות ריק", "error");
            if (isNaN(reward) || reward <= 0) return showToast("התגמול חייב להיות מספר חיובי", "error");
            setModalConfig(null);
            await db.collection(`artifacts/${appId}/public/data/tasks`).add({
              familyId: familyId, childId: activeProfileId, title: input1, reward: reward, isRecurring: !!input3, completed: false, approved: false, createdAt: Date.now()
            });
            notify(`משימה חדשה ממתינה לך: "${input1}" (₪${reward})`, activeProfileId);
            showToast("המשימה נשמרה בהצלחה!");
            return;
          }

          if (type === 'addGoal') {
            const target = Number(input2);
            if (!input1) return showToast("שם היעד לא יכול להיות ריק", "error");
            if (isNaN(target) || target <= 0) return showToast("המחיר חייב להיות מספר חיובי", "error");
            setModalConfig(null);
            await db.collection(`artifacts/${appId}/public/data/goals`).add({
              familyId: familyId, childId: activeProfileId, title: input1, target: target, createdAt: Date.now()
            });
            showToast("יעד חיסכון חדש נוסף!");
            return;
          }

          if (type === 'deleteTask') {
            setModalConfig(null);
            await db.doc(`artifacts/${appId}/public/data/tasks/${data.id}`).delete();
            showToast("המשימה נמחקה");
            return;
          }

          if (type === 'deleteGoal') {
            setModalConfig(null);
            await db.doc(`artifacts/${appId}/public/data/goals/${data.id}`).delete();
            showToast("היעד נמחק");
            return;
          }
        } catch (error) {
          console.error(error);
          setModalConfig(null); 
          showToast("שגיאת הרשאות בענן.", "error");
        }
      };

      const toggleTaskCompletion = async (task) => {
        if (!user || viewMode !== 'child') return;
        if (task.approved) return showToast("המשימה כבר אושרה ושולמה, לא ניתן לשנות.", "error");
        try {
          const isNowCompleted = !task.completed;
          await db.doc(`artifacts/${appId}/public/data/tasks/${task.id}`).update({ completed: isNowCompleted });
          const profileName = activeProfile ? activeProfile.name : '';
          if (isNowCompleted) notify(`${profileName} סיים/ה את המשימה "${task.title}" וממתין/ה לאישור!`, 'parent');
        } catch (error) { showToast("שגיאה בעדכון", "error"); }
      };

      const toggleTaskApproval = async (task) => {
        if (!user || viewMode !== 'parent' || !activeProfile) return;
        if (!task.completed && !task.approved) return showToast("לא ניתן לאשר משימה שטרם בוצעה.", "error");

        try {
          const taskRef = db.doc(`artifacts/${appId}/public/data/tasks/${task.id}`);
          const profileRef = db.doc(`artifacts/${appId}/public/data/profiles/${task.childId}`);
          
          if (!task.approved) {
            await profileRef.update({ balance: activeProfile.balance + task.reward });
            notify(`איזה יופי! המשימה "${task.title}" אושרה וקיבלתם ₪${task.reward}!`, task.childId);
            if (task.isRecurring) {
              await taskRef.update({ completed: false, approved: false });
              showToast(`שולם ₪${task.reward} והמשימה התאפסה!`);
            } else {
              await taskRef.update({ approved: true });
              showToast(`שולם ₪${task.reward} בהצלחה!`);
            }
          } else {
            await profileRef.update({ balance: Math.max(0, activeProfile.balance - task.reward) });
            await taskRef.update({ approved: false });
            showToast("האישור בוטל והכסף ירד.", "error");
          }
        } catch (error) { showToast("שגיאה בעדכון יתרה", "error"); }
      };

      const accessibilityStyles = useMemo(() => ({ fontSize: `${fontSize}px` }), [fontSize]);
      const themeClasses = highContrast ? 'bg-black text-yellow-400' : isDarkMode ? 'bg-slate-900 text-white' : 'bg-gray-50 text-gray-900';
      const cardClasses = highContrast ? 'bg-gray-900 border-2 border-yellow-400' : isDarkMode ? 'bg-slate-800 border-slate-700 border' : 'bg-white border-gray-100 border shadow-sm';
      const modalInputClass = `w-full p-4 rounded-xl border-2 font-medium focus:outline-none transition-colors text-center text-xl tracking-widest ${highContrast ? 'bg-black border-yellow-400 text-yellow-400 placeholder-yellow-600/50 focus:bg-yellow-400/10' : isDarkMode ? 'bg-slate-700 border-slate-600 text-white placeholder-slate-400 focus:border-indigo-500' : 'bg-gray-50 border-gray-200 text-gray-900 focus:border-indigo-500 focus:bg-white'}`;
      const modalTextInputClass = `w-full p-4 rounded-xl border-2 font-medium focus:outline-none transition-colors ${highContrast ? 'bg-black border-yellow-400 text-yellow-400 placeholder-yellow-600/50 focus:bg-yellow-400/10' : isDarkMode ? 'bg-slate-700 border-slate-600 text-white placeholder-slate-400 focus:border-indigo-500' : 'bg-gray-50 border-gray-200 text-gray-900 focus:border-indigo-500 focus:bg-white'}`;
      const modalCancelBtn = `flex-1 py-3 rounded-xl font-bold transition-colors ${highContrast ? 'bg-transparent border-2 border-yellow-400 text-yellow-400 hover:bg-yellow-400/10' : 'bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-slate-600'}`;
      const modalSubmitBtn = `flex-1 py-3 rounded-xl font-bold transition-transform active:scale-95 ${highContrast ? 'bg-yellow-400 text-black' : 'bg-indigo-600 text-white shadow-lg shadow-indigo-200 dark:shadow-none hover:bg-indigo-700'}`;

      if (!isReady) return null;

      return (
        <div className={`min-h-screen transition-colors duration-300 pb-24 ${themeClasses}`} style={accessibilityStyles} dir="rtl">
          <Toast message={toast.message} type={toast.type} onClose={() => setToast({ message: '', type: '' })} />

          <nav className={`sticky top-0 z-40 border-b backdrop-blur-md ${highContrast ? 'bg-black border-yellow-400' : isDarkMode ? 'bg-slate-900/90 border-slate-700' : 'bg-white/90 border-gray-200'}`}>
            <div className="max-w-5xl mx-auto px-4 flex justify-between h-[72px] items-center">
              <div className="flex items-center gap-3">
                <div className={`p-2 rounded-xl shadow-lg ${highContrast ? 'bg-yellow-400 text-black' : 'bg-indigo-600 text-white shadow-indigo-200'}`}>
                  <Wallet size={28} />
                </div>
                <span className={`text-2xl font-black tracking-tight ${highContrast ? 'text-yellow-400' : 'text-indigo-600'}`}>דמי כיס</span>
              </div>

              <div className="flex items-center gap-2">

                {activeProfileId && (
                  <button onClick={() => { openModal('notifications'); markNotificationsAsRead(); }} className="relative min-w-[44px] min-h-[44px] flex items-center justify-center rounded-full hover:bg-gray-200 dark:hover:bg-slate-800 transition-colors">
                    <Bell size={24} className={highContrast ? 'text-yellow-400' : 'text-indigo-600'} />
                    {unreadCount > 0 && <span className="absolute top-2 right-2 w-3 h-3 bg-red-500 rounded-full border-2 border-white dark:border-slate-900"></span>}
                  </button>
                )}

                <button onClick={copyShareLink} className={`min-w-[44px] min-h-[44px] flex items-center justify-center rounded-full transition-colors ${highContrast ? 'text-yellow-400 border border-yellow-400 hover:bg-yellow-400 hover:text-black' : 'bg-green-100 text-green-700 hover:bg-green-200 dark:bg-green-900/30 dark:text-green-400'}`}>
                  <Share2 size={20} />
                </button>

                {activeProfileId && (
                  <div className={`hidden sm:flex p-1 rounded-xl ml-2 ${highContrast ? 'border border-yellow-400' : 'bg-gray-100 dark:bg-slate-800'}`}>
                    <button onClick={() => setViewMode('child')} className={`min-h-[44px] px-4 rounded-lg font-bold transition-all ${viewMode === 'child' ? (highContrast ? 'bg-yellow-400 text-black' : 'bg-white dark:bg-slate-700 shadow-sm text-indigo-600') : 'text-gray-500'}`}>תצוגת ילד/ה</button>
                    <button onClick={handleParentModeRequest} className={`min-h-[44px] px-4 rounded-lg font-bold transition-all flex items-center gap-1 ${viewMode === 'parent' ? (highContrast ? 'bg-yellow-400 text-black' : 'bg-white dark:bg-slate-700 shadow-sm text-indigo-600') : 'text-gray-500'}`}>
